<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a09">
<title>Lista Compra — W//APPS</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin><script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js">
// ── Haptic feedback (silencioso si el dispositivo no lo soporta) ──
function haptic(pattern='light') {
  if (!navigator.vibrate) return;
  if (pattern === 'light') navigator.vibrate(8);
  else if (pattern === 'medium') navigator.vibrate(18);
  else if (pattern === 'success') navigator.vibrate([8, 50, 8]);
  else if (pattern === 'error') navigator.vibrate([30, 60, 30]);
  else navigator.vibrate(pattern);
}

</script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<script src="wapps-config.js"></script>
<script src="wapps-store.js"></script>
<script src="wapps-firebase.js"></script>
<script src="wapps-sync-ui.js" defer></script>
<script src="wapps-nav.js" defer></script>
<script src="wapps-onboarding.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;--y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;--o:#f09030;--fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;--fs:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fs);overflow-x:hidden;}
.wnav{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-shrink:0;}
.wnav-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--y);background:rgba(232,240,64,0.08);color:var(--y);text-decoration:none;transition:all 0.15s;flex-shrink:0;}
.wnav-back:hover{background:rgba(232,240,64,0.18);color:var(--y);}
.wnav-logo{font-family:var(--fh);font-size:16px;letter-spacing:2px;flex-shrink:0;}
.wnav-logo a{color:var(--muted);text-decoration:none;}
.wnav-logo a span{color:var(--y);}
.wnav-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.wnav-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;}
.tabs{display:flex;padding:0 16px;gap:2px;border-bottom:1px solid var(--border2);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:9px 14px;font-size:11px;font-family:var(--fm);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.tab.active{color:var(--y);border-bottom-color:var(--y);}
.content{flex:1;overflow-y:auto;padding:0 16px 100px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.section{display:none;padding-top:14px;}
.section.active{display:block;}
.list-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border2);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.list-bar::-webkit-scrollbar{display:none;}
.list-chip{flex-shrink:0;padding:5px 12px;font-family:var(--fh);font-size:13px;letter-spacing:0.5px;border:0.5px solid var(--border2);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.list-chip.active{background:var(--y);color:#0a0a09;border-color:var(--y);}
.list-add-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.list-add-btn:hover{color:var(--y);}
input,select{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--y);}
select option{background:var(--bg2);}
.btn{padding:9px 14px;font-size:12px;font-family:var(--fm);border:0.5px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.btn:hover{background:var(--bg3);}
.btn-y{background:var(--y);color:#0a0a09;border-color:var(--y);font-family:var(--fh);font-size:15px;letter-spacing:1px;}
.btn-r{background:var(--r);color:#fff;border-color:var(--r);font-weight:500;}
.btn-sm{padding:5px 11px;font-size:11px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;flex-wrap:wrap;gap:6px;}
.list-name{font-family:var(--fh);font-size:24px;letter-spacing:1px;}
.top-actions{display:flex;gap:6px;flex-wrap:wrap;}
.top-btn{background:var(--bg2);border:0.5px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--fm);font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;}
.top-btn:hover{color:var(--text);}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pbar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;background:var(--y);transition:width 0.3s;}
.pbar-label{font-size:11px;font-family:var(--fm);color:var(--muted);white-space:nowrap;}
/* Store selector */
.store-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.store-label{font-size:10px;color:var(--muted);font-family:var(--fm);letter-spacing:0.5px;text-transform:uppercase;flex-shrink:0;}
.store-chip{padding:4px 12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:99px;font-size:11px;font-family:var(--fm);color:var(--muted);cursor:pointer;white-space:nowrap;}
.store-chip.active{background:rgba(48,168,240,0.12);color:var(--b);border-color:rgba(48,168,240,0.3);}
.quick-add{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
/* qty + unit inline group */
.qty-group{display:flex;gap:0;flex-shrink:0;border-radius:8px;overflow:hidden;border:0.5px solid var(--border2);}
.qty-num{width:52px;background:var(--bg2);border:none;color:var(--text);font-family:var(--fm);font-size:12px;padding:10px 6px;outline:none;text-align:right;-moz-appearance:textfield;}
.qty-num::-webkit-outer-spin-button,.qty-num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.qty-num:focus{background:var(--bg3);}
.qty-unit{background:var(--bg3);border:none;border-left:0.5px solid var(--border2);color:var(--muted);font-family:var(--fm);font-size:11px;padding:10px 6px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
.qty-unit:focus{color:var(--text);}
.qty-unit option{background:var(--bg2);}
.quick-input{flex:2;min-width:120px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:10px 12px;outline:none;}
.quick-input:focus{border-color:var(--y);}
.cat-select{background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:12px;padding:10px 8px;outline:none;cursor:pointer;flex-shrink:0;}
.qty-input{display:none;}
.add-quick-btn{background:var(--y);color:#0a0a09;border:none;border-radius:8px;padding:10px 16px;font-family:var(--fh);font-size:14px;cursor:pointer;flex-shrink:0;}
.cat-group{margin-bottom:12px;}
.cat-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.cat-hd-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-family:var(--fm);}
.cat-hd-line{flex:1;height:0.5px;background:var(--border2);}
.cat-hd-cnt{font-size:10px;color:var(--dim);}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-check{width:20px;height:20px;flex-shrink:0;border:1.5px solid var(--border2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item-check.done{background:var(--g);border-color:var(--g);}
.item-check.done::after{content:'✓';font-size:11px;color:#0a0a09;font-weight:700;}
.item-text{flex:1;font-size:14px;}
.item-text.done{text-decoration:line-through;color:var(--muted);}
.item-qty{font-size:11px;color:var(--b);font-family:var(--fm);flex-shrink:0;background:rgba(48,168,240,0.08);border:0.5px solid rgba(48,168,240,0.2);padding:2px 7px;border-radius:99px;}
.item-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;opacity:0.3;flex-shrink:0;}
.item-del:hover{opacity:1;color:var(--r);}
.done-toggle{background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:11px;cursor:pointer;padding:0;margin-top:8px;}
.done-toggle:hover{color:var(--text);}
/* Categories config */
.cat-config-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.cat-config-row:last-child{border-bottom:none;}
.cat-config-emoji{font-size:18px;flex-shrink:0;width:32px;text-align:center;}
.cat-config-name{flex:1;font-size:13px;}
.cat-config-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;opacity:0.3;}
.cat-config-del:hover{opacity:1;color:var(--r);}
/* New list form */
.new-list-form{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px;margin:8px 0;display:none;}
.new-list-form.open{display:block;}
/* Stores config */
.store-config-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.store-config-row:last-child{border-bottom:none;}
.section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;font-family:var(--fm);}
.data-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px;}
.fb{font-size:11px;margin-top:8px;display:none;font-family:var(--fm);}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:2rem 1rem;line-height:1.7;}
.fab-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;padding:12px 16px 24px;background:linear-gradient(to top,var(--bg) 60%,transparent);pointer-events:none;}
.fab{pointer-events:all;width:100%;padding:13px;font-family:var(--fh);font-size:14px;background:var(--y);color:#0a0a09;border:none;border-radius:12px;cursor:pointer;letter-spacing:0.3px;}
.fab:active{transform:scale(0.97);}

/* ── MODAL PRECIOS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90dvh;display:flex;flex-direction:column;animation:sheetUp 0.22s ease;}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-grip{width:36px;height:3px;background:var(--dim);border-radius:99px;margin:14px auto 0;flex-shrink:0;}
.modal-head{padding:14px 18px 10px;flex-shrink:0;border-bottom:0.5px solid var(--border2);}
.modal-title{font-family:var(--fh);font-size:20px;letter-spacing:0.5px;margin-bottom:2px;}
.modal-sub{font-size:11px;color:var(--muted);font-family:var(--fm);}
.modal-body{flex:1;overflow-y:auto;padding:0 18px 8px;scrollbar-width:none;}
.modal-body::-webkit-scrollbar{display:none;}
.price-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.price-row:last-child{border-bottom:none;}
.price-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--muted);}
.price-name{flex:1;font-size:13px;min-width:0;}
.price-qty{font-size:11px;color:var(--muted);font-family:var(--fm);flex-shrink:0;}
.price-input{width:88px;flex-shrink:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--fm);font-size:13px;padding:7px 10px;outline:none;text-align:right;}
.price-input:focus{border-color:var(--y);}
.modal-footer{padding:14px 18px 32px;border-top:0.5px solid var(--border2);flex-shrink:0;}
.modal-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.modal-total-label{font-size:11px;color:var(--muted);font-family:var(--fm);}
.modal-total-value{font-family:var(--fh);font-size:28px;letter-spacing:0.5px;color:var(--y);}
.modal-btns{display:flex;gap:8px;}

/* ── GLOBAL SPINNER ── */
.wapp-loading{position:fixed;inset:0;background:rgba(10,10,9,0.85);backdrop-filter:blur(4px);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:1;transition:opacity 0.3s;}
.wapp-loading.fade{opacity:0;pointer-events:none;}
.wapp-spinner{width:28px;height:28px;border:2px solid rgba(232,240,64,0.2);border-top-color:#e8f040;border-radius:50%;animation:wapp-spin 0.65s linear infinite;}
@keyframes wapp-spin{to{transform:rotate(360deg)}}
.wapp-loading-text{font-family:'DM Mono',monospace;font-size:11px;color:#5a5850;letter-spacing:1px;}

.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--bg2,#141412);min-height:34px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sync-dot.online{background:var(--g,#30d880);}
.sync-dot.offline{background:var(--r,#f04030);}
.sync-dot.syncing{background:var(--y,#e8f040);animation:pulse 0.8s ease-in-out infinite;}
.sync-label{color:var(--muted,#5a5850);}
.sync-label.online{color:var(--g,#30d880);}
.sync-label.offline{color:var(--r,#f04030);}
.sync-label.syncing{color:var(--y,#e8f040);}
.sync-pending{font-size:9px;color:var(--y,#e8f040);letter-spacing:0.5px;}
.sync-btn{background:transparent;border:0.5px solid var(--dim,#2a2a26);color:var(--muted,#5a5850);font-family:var(--fm);font-size:9px;letter-spacing:1px;padding:3px 9px;cursor:pointer;transition:all 0.15s;}
.sync-btn:hover:not(:disabled){border-color:var(--y,#e8f040);color:var(--y,#e8f040);}
.sync-btn:disabled{opacity:0.35;cursor:default;}
.wnav-version{font-size:9px;color:var(--dim);font-family:var(--fm);letter-spacing:0.5px;border:1px solid var(--dim);padding:2px 6px;border-radius:3px;flex-shrink:0;}

/* === RESPONSIVE: tablet/desktop (content centered via inner container) === */
@media (min-width:720px){
  body > *:not(.wapp-loading):not(.login-screen):not(.cl-backdrop):not(.fab-area){max-width:760px;margin-left:auto;margin-right:auto;}
  .fab-area{max-width:760px!important;left:50%!important;transform:translateX(-50%)!important;}
  .wnav{max-width:760px;margin-left:auto;margin-right:auto;width:100%;box-sizing:border-box;}
}
@media (min-width:1024px){
  body > *:not(.wapp-loading):not(.login-screen):not(.cl-backdrop):not(.fab-area){max-width:900px;}
  .fab-area{max-width:900px!important;}
  .wnav{max-width:900px;}
}

/* === iPad horizontal (landscape) === */
@media (min-width:720px) and (orientation:landscape){
  /* Aumentar max-width en landscape para aprovechar el espacio */
  body > *:not(.wapp-loading):not(.login-screen):not(.cl-backdrop):not(.fab-area){max-width:900px;}
  .fab-area{max-width:900px!important;}
  .wnav{max-width:900px;}
  /* Fuentes ligeramente más grandes en pantalla grande */
  .ic-name{font-size:11px;}
  .dash-card{min-height:100px;}
}
@media (min-width:1200px){
  body > *:not(.wapp-loading):not(.login-screen):not(.cl-backdrop):not(.fab-area){max-width:1100px;}
  .fab-area{max-width:1100px!important;}
  .wnav{max-width:1100px;}
}
</style>
</head>
<body>

<!-- Global loading spinner -->
<div class="wapp-loading" id="wapp-loading">
  <div class="wapp-spinner"></div>
  <div class="wapp-loading-text">CARGANDO…</div>
</div>
  <div class="sync-bar" id="sync-bar">
    <div class="sync-status">
      <div class="sync-dot offline" id="sync-dot"></div>
      <span class="sync-label offline" id="sync-label">OFFLINE</span>
      <span class="sync-pending" id="sync-pending"></span>
    </div>
    <div style="display:flex;gap:6px;">
    <button class="sync-btn" id="pull-btn" onclick="manualPull()" disabled>↓ PULL</button>
    <button class="sync-btn" id="sync-btn" onclick="manualSync()" disabled>↑ SYNC</button>
    <button class="sync-btn" id="push-app-btn" onclick="manualPushApp('compra.data')" title="Forzar subida de esta app a Firebase">⬆ SUBIR</button>
  </div>
  </div>
<div class="shell">
  <div class="wnav">
    <a class="wnav-back" href="index.html"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="var(--y)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    <div class="wnav-logo"><a href="index.html">W<span>//</span>APPS</a></div>
    <div class="wnav-sep"></div>
    <div class="wnav-title">LISTA DE LA COMPRA</div>
  <div class="wnav-version">v1.x</div>
  </div>
  <div class="list-bar" id="list-bar"></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('compra',this)">Lista</button>
    <button class="tab" onclick="showTab('config',this)">Config</button>
    <button class="tab" onclick="showTab('historial',this)">Historial</button>
  <button class="tab" onclick="showTab('datos',this)">Datos</button>
  </div>
  <div class="content">
    <div id="compra" class="section active">
      <div class="new-list-form" id="new-list-form">
        <div style="display:flex;gap:8px;">
          <input type="text" id="nl-name" placeholder="Nombre de la lista…" style="flex:1;" onkeydown="if(event.key==='Enter')addList()">
          <button class="btn btn-y btn-sm" onclick="addList()">Crear</button>
          <button class="btn btn-sm" onclick="document.getElementById('new-list-form').classList.remove('open')">✕</button>
        </div>
      </div>
      <div id="main-body"></div>
    </div>
    <div id="config" class="section"><div id="config-body"></div><div style="margin-top:16px;"><div class="section-label" style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Notificaciones</div><div id="notif-config-compra"></div></div></div>
    <div id="historial" class="section"><div id="historial-body"></div></div>
  <div id="datos" class="section">
      <div class="data-card">
        <div style="font-family:var(--fh);font-size:16px;margin-bottom:6px;">Exportar / Importar</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--fm);margin-bottom:10px;" id="datos-info"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-y btn-sm" style="flex:1" onclick="exportJSON()">↓ Exportar JSON</button>
          <button class="btn btn-sm" style="flex:1" onclick="document.getElementById('fi').click()">↑ Importar JSON</button>
          <input type="file" id="fi" accept=".json" style="display:none" onchange="importFile(event)">
        </div>
        <div id="datos-fb" class="fb"></div>
      </div>
      <div class="data-card">
        <div style="font-family:var(--fh);font-size:14px;margin-bottom:4px;">Guía de uso</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--fm);margin-bottom:10px;">Vuelve a ver la introducción de la app.</div>
        <button class="btn btn-sm" style="width:100%;" onclick="if(typeof WOnboarding!=='undefined'){WOnboarding.reset('compra');WOnboarding.show('compra',OB_STEPS)}">👋 Ver guía de nuevo</button>
      </div>
    </div>
  </div>
  <div class="fab-area" id="fab-area" style="display:none;">
    <button class="fab" onclick="focusQuickAdd()">+ Añadir artículo</button>
  </div>
</div>

<!-- ── MODAL PRECIOS AL TERMINAR ── -->
<div class="modal-overlay" id="modal-precios" onclick="closeModalPrecios(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-grip"></div>
    <div class="modal-head">
      <div class="modal-title">🛒 ¿Cuánto has gastado?</div>
      <div class="modal-sub" id="modal-precios-sub">Añade el precio de cada artículo para registrarlo en Gastos</div>
    </div>
    <div class="modal-body" id="modal-precios-body"></div>
    <div class="modal-footer">
      <div class="modal-total-row">
        <span class="modal-total-label">TOTAL COMPRA</span>
        <span class="modal-total-value" id="modal-total">0,00 €</span>
      </div>
      <div class="modal-btns">
        <button class="btn" style="flex:1" onclick="closeModalPrecios()">Saltar</button>
        <button class="btn btn-y" style="flex:2" onclick="confirmarGastoCompra()">Registrar en Gastos →</button>
      </div>
    </div>
  </div>
</div>
<script>
let state=loadState(),nid=state.nextId||1,activeListId=null,showDone=false,activeStore='',currentTab='compra';

function loadState(){
  try{const r=localStorage.getItem('compra_v2');if(r)return JSON.parse(r);}catch(e){}
  // migrate v1
  try{const r=localStorage.getItem('compra_v1');if(r)return JSON.parse(r);}catch(e){}
  return{
    lists:[{id:1,name:'Supermercado'},{id:2,name:'General'}],
    items:[],
    cats:[
      {id:'fruta',emoji:'🍎',name:'Fruta y verdura'},
      {id:'lacteos',emoji:'🥛',name:'Lácteos'},
      {id:'carne',emoji:'🥩',name:'Carne y pescado'},
      {id:'panaderia',emoji:'🍞',name:'Panadería'},
      {id:'congelados',emoji:'🧊',name:'Congelados'},
      {id:'bebidas',emoji:'🧃',name:'Bebidas'},
      {id:'limpieza',emoji:'🧹',name:'Limpieza'},
      {id:'higiene',emoji:'🧴',name:'Higiene'},
      {id:'otros',emoji:'📦',name:'Otros'},
    ],
    stores:['Mercadona','Lidl','Carrefour','Amazon'],
    nextId:10,
    history:[] // [{date, items:[]}] — completed lists
  };
}
function save(){state.nextId=nid;try{localStorage.setItem('compra_v2',JSON.stringify(state));}catch(e){}if(typeof WStore!=='undefined')WStore.set('compra','data',state);}

// Debounce: agrupa saves consecutivos en uno (200ms)
let _saveDebounce = null;
const _saveImmediate = save;
function save() {
  if (_saveDebounce) clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(() => { _saveDebounce = null; _saveImmediate(); }, 200);
}
window.addEventListener('beforeunload', () => { if (_saveDebounce) _saveImmediate(); }, {once:true});


// wuid(): ID numérico único basado en timestamp. Seguro en onclick="fn(id)".
// Probabilidad de colisión entre 2 dispositivos en el mismo millisegundo: ~0 en uso real.
function wuid() {
  return Date.now();
}
function nxtId(){ return wuid(); }
function esc(s){var t=String(s||'');t=t.replace(/&/g,'&amp;');t=t.replace(new RegExp('<','g'),'&lt;');t=t.replace(new RegExp('>','g'),'&gt;');t=t.replace(new RegExp(String.fromCharCode(34),'g'),'&quot;');return t;}
function catById(id){return state.cats.find(c=>c.id===id)||{emoji:'📦',name:id};}

if(state.lists.length)activeListId=state.lists[0].id;

function showTab(name,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');el.classList.add('active');
  currentTab=name;
  document.getElementById('fab-area').style.display=name==='compra'?'block':'none';
  render();
}

function render(){
  renderListBar();
  if(currentTab==='compra')renderCompra();
  if(currentTab==='config')renderConfig();
  if(currentTab==='historial')renderHistorial();
  if(currentTab==='datos')renderDatos();
}

function renderListBar(){
  document.getElementById('list-bar').innerHTML=
    state.lists.map(l=>`<button class="list-chip ${l.id===activeListId?'active':''}" onclick="selectList(${l.id})">${esc(l.name)}</button>`).join('')+
    `<button class="list-add-btn" onclick="document.getElementById('new-list-form').classList.add('open')">+</button>`;
}

function addList(){
  const name=document.getElementById('nl-name').value.trim();if(!name)return;
  const list={id:nxtId(),name};state.lists.push(list);activeListId=list.id;
  document.getElementById('nl-name').value='';
  document.getElementById('new-list-form').classList.remove('open');
  save();render();
}
function selectList(id){activeListId=id;showDone=false;activeStore='';render();}

function addItem(){
  const txt=document.getElementById('qi-text').value.trim();if(!txt||!activeListId)return;
  const cat=document.getElementById('qi-cat').value;
  const num=document.getElementById('qi-num').value.trim();
  const unit=document.getElementById('qi-unit').value;
  // Build qty string: "2 kg", "500 g", "3 uds", or empty if no number
  const qty = num ? `${num} ${unit}` : '';
  state.items.push({id:nxtId(),listId:activeListId,text:txt,cat,qty,unit:num?unit:'',done:false,store:activeStore});
  document.getElementById('qi-text').value='';
  document.getElementById('qi-num').value='';
  save();render();
  document.getElementById('qi-text')?.focus();
}
function toggleItem(id){
  haptic('light');const i=state.items.find(x=>x.id===id);if(i){i.done=!i.done;save();render();}}
function delItem(id){state.items=state.items.filter(x=>x.id!==id);save();render();}
function clearDone(){
  const allItems = state.items.filter(i=>i.listId===activeListId);
  const doneItems = state.items.filter(i=>i.listId===activeListId&&i.done);
  if(!doneItems.length) return;

  // Si TODA la lista está hecha → abrir modal de precios
  const allDone = allItems.length > 0 && allItems.every(i=>i.done);
  if(allDone){
    openModalPrecios(doneItems);
    return;
  }

  // Si solo algunos están hechos → archivar y limpiar directamente
  _archivarYLimpiar(doneItems);
}

function _archivarYLimpiar(doneItems){
  if(!doneItems.length) return;
  if(!state.history) state.history=[];
  const list = state.lists.find(l=>l.id===activeListId);
  state.history.unshift({
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    listName: list?.name||'Lista',
    items: doneItems.map(i=>({text:i.text, cat:i.cat, qty:i.qty, precio:i.precio||null}))
  });
  if(state.history.length>20) state.history=state.history.slice(0,20);
  state.items = state.items.filter(i=>!(i.listId===activeListId&&i.done));
  if(typeof WStore!=='undefined') WStore.set('compra','data',state);
  save(); render();
}
function clearAll(){if(!confirm('¿Vaciar toda la lista?'))return;state.items=state.items.filter(i=>i.listId!==activeListId);save();render();}
function focusQuickAdd(){document.getElementById('qi-text')?.focus();}

function renderCompra(){
  if(!activeListId){document.getElementById('main-body').innerHTML='<div class="empty">Crea una lista para empezar.</div>';return;}
  const list=state.lists.find(l=>l.id===activeListId);
  let items=state.items.filter(i=>i.listId===activeListId);
  if(activeStore)items=items.filter(i=>!i.store||i.store===activeStore||i.done);
  const allItems=state.items.filter(i=>i.listId===activeListId); // all, unfiltered
  const pending=items.filter(i=>!i.done);
  const done=items.filter(i=>i.done);
  const allDone=allItems.length>0&&allItems.every(i=>i.done);
  const pct=items.length?Math.round(done.length/items.length*100):0;

  // Cat select options
  const catOpts=state.cats.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');

  let html=`
    <div class="top-bar">
      <div class="list-name">${esc(list.name)}</div>
      <div class="top-actions">
        ${done.length?`<button class="top-btn" onclick="clearDone()" style="${allDone?'background:rgba(232,240,64,0.12);color:var(--y);border-color:rgba(232,240,64,0.3);':''}">
          ${allDone?'🎉 ¡Lista completa!':'✓ Limpiar hechos'}
        </button>`:''}
        <button class="top-btn btn-r" onclick="clearAll()">🗑 Vaciar</button>
      </div>
    </div>
    <div class="progress-row">
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-label">${done.length}/${items.length} listos</div>
    </div>`;

  // Store filter
  if(state.stores.length){
    html+=`<div class="store-row">
      <span class="store-label">Tienda:</span>
      <span class="store-chip ${!activeStore?'active':''}" onclick="activeStore='';render()">Todas</span>
      ${state.stores.map(s=>`<span class="store-chip ${activeStore===s?'active':''}" onclick="activeStore='${s}';render()">${esc(s)}</span>`).join('')}
    </div>`;
  }

  html+=`<div class="quick-add">
    <input class="quick-input" id="qi-text" placeholder="Añadir artículo…" onkeydown="if(event.key==='Enter')addItem()">
    <select class="cat-select" id="qi-cat">${catOpts}</select>
    <div class="qty-group">
      <input class="qty-num" id="qi-num" type="number" min="0" step="any" placeholder="—" title="Cantidad">
      <select class="qty-unit" id="qi-unit" title="Unidad">
        <option value="uds">uds</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="L">L</option>
        <option value="mL">mL</option>
        <option value="paquete">paq.</option>
        <option value="bote">bote</option>
        <option value="lata">lata</option>
        <option value="bolsa">bolsa</option>
      </select>
    </div>
    <button class="add-quick-btn" onclick="addItem()">+</button>
  </div>`;

  if(!pending.length&&!done.length){html+='<div class="empty">Lista vacía. Añade artículos arriba.</div>';}

  // Group by cat
  const groups={};
  pending.forEach(i=>{if(!groups[i.cat])groups[i.cat]=[];groups[i.cat].push(i);});
  // Sort by cat order
  const orderedCats=state.cats.map(c=>c.id).filter(id=>groups[id]);
  orderedCats.forEach(catId=>{
    const arr=groups[catId];const c=catById(catId);
    html+=`<div class="cat-group"><div class="cat-hd"><span class="cat-hd-label">${c.emoji} ${c.name}</span><div class="cat-hd-line"></div><span class="cat-hd-cnt">${arr.length}</span></div>`;
    arr.forEach(i=>{
      const qtyBadge = i.qty ? `<span class="item-qty">${esc(i.qty)}</span>` : '';
      html+=`<div class="item-row">
        <div class="item-check" onclick="toggleItem(${i.id})"></div>
        <span class="item-text">${esc(i.text)}</span>
        ${qtyBadge}
        ${i.store?`<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(48,168,240,0.1);color:var(--b);font-family:var(--fm);">${esc(i.store)}</span>`:''}
        <button class="item-del" onclick="openQtyEdit(${i.id},event)" title="Editar cantidad" style="font-size:13px;opacity:0.22;">⚖</button>
        <button class="item-del" onclick="delItem(${i.id})">×</button>
      </div>
      <div id="qe-${i.id}" style="display:none;padding:5px 0 8px 30px;">
        <div style="display:flex;gap:6px;align-items:center;">
          <div class="qty-group">
            <input class="qty-num" id="qe-num-${i.id}" type="number" min="0" step="any"
              value="${extractNum(i.qty)}" placeholder="—"
              onkeydown="if(event.key==='Enter')saveQtyEdit(${i.id})">
            <select class="qty-unit" id="qe-unit-${i.id}">${UNITS.map(u=>`<option value="${u}"${extractUnit(i.qty)===u?' selected':''}>${u}</option>`).join('')}</select>
          </div>
          <button onclick="saveQtyEdit(${i.id})" style="padding:6px 10px;background:var(--y);color:#0a0a09;border:none;border-radius:6px;font-family:var(--fm);font-size:11px;cursor:pointer;">✓</button>
          <button onclick="document.getElementById('qe-${i.id}').style.display='none'" style="padding:6px 10px;background:transparent;border:0.5px solid var(--border2);border-radius:6px;font-family:var(--fm);font-size:11px;color:var(--muted);cursor:pointer;">✕</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });

  if(done.length){
    html+=`<div style="margin-top:12px;">
      <button class="done-toggle" onclick="showDone=!showDone;render()">${showDone?'▲':'▼'} Hechos (${done.length})</button>`;
    if(showDone){
      done.forEach(i=>{
        html+=`<div class="item-row">
          <div class="item-check done" onclick="toggleItem(${i.id})"></div>
          <span class="item-text done">${esc(i.text)}</span>
          <button class="item-del" onclick="delItem(${i.id})">×</button>
        </div>`;
      });
    }
    html+='</div>';
  }
  document.getElementById('main-body').innerHTML=html;
}

function renderConfig(){
  let html=`<div class="section-label">Categorías</div>
    <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:12px;">
      ${state.cats.map(c=>`<div class="cat-config-row">
        <span class="cat-config-emoji">${c.emoji}</span>
        <span class="cat-config-name">${esc(c.name)}</span>
        <button class="cat-config-del" onclick="delCat('${c.id}')">×</button>
      </div>`).join('')}
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
        <input type="text" id="nc-emoji" placeholder="🥗" style="width:60px;flex-shrink:0;">
        <input type="text" id="nc-name" placeholder="Nueva categoría…" style="flex:1;min-width:100px;">
        <button class="btn btn-y btn-sm" onclick="addCat()">+ Añadir</button>
      </div>
    </div>
    <div class="section-label">Establecimientos</div>
    <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:12px;">
      ${state.stores.map((s,i)=>`<div class="store-config-row">
        <span style="flex:1;font-size:13px;">${esc(s)}</span>
        <button class="cat-config-del" onclick="delStore(${i})">×</button>
      </div>`).join('')}
      <div style="display:flex;gap:6px;margin-top:10px;">
        <input type="text" id="ns-name" placeholder="Nuevo establecimiento…" style="flex:1;" onkeydown="if(event.key==='Enter')addStore()">
        <button class="btn btn-y btn-sm" onclick="addStore()">+ Añadir</button>
      </div>
    </div>
    <div class="section-label">Listas</div>
    <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;">
      ${state.lists.map(l=>`<div class="store-config-row">
        <span style="flex:1;font-size:13px;">${esc(l.name)}</span>
        <span style="font-size:10px;color:var(--muted);font-family:var(--fm);">${state.items.filter(i=>i.listId===l.id).length} items</span>
        <button class="cat-config-del" onclick="delList(${l.id})">×</button>
      </div>`).join('')}
    </div>`;
  document.getElementById('config-body').innerHTML=html;
}

function addCat(){
  const emoji=document.getElementById('nc-emoji').value.trim()||'📦';
  const name=document.getElementById('nc-name').value.trim();if(!name)return;
  const id='cat_'+Date.now();
  state.cats.push({id,emoji,name});
  document.getElementById('nc-emoji').value='';document.getElementById('nc-name').value='';
  save();renderConfig();
}
function delCat(id){
  if(state.items.some(i=>i.cat===id)){if(!confirm('Esta categoría tiene artículos. ¿Eliminar igualmente?'))return;}
  state.cats=state.cats.filter(c=>c.id!==id);save();render();
}
function addStore(){
  const name=document.getElementById('ns-name').value.trim();if(!name)return;
  state.stores.push(name);document.getElementById('ns-name').value='';save();renderConfig();
}
function delStore(idx){state.stores.splice(idx,1);if(activeStore===state.stores[idx])activeStore='';save();render();}
function delList(id){
  if(!confirm(`¿Eliminar lista? Se borrarán también sus ${state.items.filter(i=>i.listId===id).length} artículos.`))return;
  state.lists=state.lists.filter(l=>l.id!==id);state.items=state.items.filter(i=>i.listId!==id);
  if(activeListId===id)activeListId=state.lists[0]?.id||null;
  save();render();
}

function renderHistorial(){
  const hist=state.history||[];
  if(!hist.length){document.getElementById('historial-body').innerHTML='<div class="empty">Sin historial aún.<br>Se guarda al marcar artículos como hechos y limpiarlos.</div>';return;}
  let html='';
  hist.forEach((entry,idx)=>{
    html+=`<div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div style="font-family:var(--fh);font-size:16px;letter-spacing:0.5px;">${esc(entry.listName)}</div>
          <div style="font-size:10px;color:var(--muted);font-family:var(--fm);">${entry.date} · ${entry.items.length} artículos</div>
        </div>
        <button onclick="reutilizarLista(${idx})" style="padding:6px 12px;background:var(--y);color:#0a0a09;border:none;border-radius:6px;font-family:var(--fm);font-size:11px;cursor:pointer;white-space:nowrap;">↺ Reutilizar</button>
      </div>
      <div style="font-size:11px;color:var(--muted);font-family:var(--fm);line-height:1.7;">${entry.items.slice(0,6).map(i=>`${i.qty?i.qty+' ':''}${esc(i.text)}`).join(' · ')}${entry.items.length>6?` · +${entry.items.length-6} más`:''}</div>
    </div>`;
  });
  document.getElementById('historial-body').innerHTML=html;
}

function reutilizarLista(histIdx){
  const entry=(state.history||[])[histIdx];
  if(!entry||!activeListId)return;
  if(!confirm(`¿Añadir los ${entry.items.length} artículos de "${entry.listName}" a la lista actual?`))return;
  entry.items.forEach(item=>{
    state.items.push({id:nxtId(),listId:activeListId,text:item.text,cat:item.cat||'otros',qty:item.qty||'',done:false});
  });
  save();render();
  showTab('compra',document.querySelectorAll('.tab')[0]);
}

function renderDatos(){
  document.getElementById('datos-info').textContent=`${state.items.length} artículos · ${state.lists.length} listas · ${state.cats.length} categorías · ${state.stores.length} establecimientos`;
}
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`compra-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showFB('Descargado ✓','var(--g)');
}
function importFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.items||!p.lists)throw new Error('Formato inválido');
      if(!confirm('¿Importar? Se reemplazarán todos los datos.'))return;
      state=p;nid=state.nextId||1;activeListId=state.lists[0]?.id||null;
      save();render();showFB('Importado ✓','var(--g)');
    }catch(err){showFB('Error: '+err.message,'var(--r)');}
  };r.readAsText(f);
}
function showFB(msg,color){const el=document.getElementById('datos-fb');if(!el)return;el.textContent=msg;el.style.color=color;el.style.display='block';setTimeout(()=>el.style.display='none',2500);}

// ── MODAL PRECIOS ──
let _modalDoneItems = [];

function openModalPrecios(doneItems){
  _modalDoneItems = doneItems;
  const list = state.lists.find(l=>l.id===activeListId);
  document.getElementById('modal-precios-sub').textContent =
    `Lista completa: ${list?.name||'Lista'} · ${doneItems.length} artículos`;
  let html = '';
  doneItems.forEach((item,idx) => {
    html += `<div class="price-row">
      <div class="price-cat-dot"></div>
      <span class="price-name">${esc(item.text)}</span>
      ${item.qty ? `<span class="price-qty">${esc(item.qty)}</span>` : ''}
      <input class="price-input" type="number" step="0.01" min="0"
        id="pi-${idx}" placeholder="0,00"
        oninput="recalcTotal()"
        onkeydown="if(event.key==='Enter'){var n=document.getElementById('pi-${idx+1}');if(n)n.focus();}">
    </div>`;
  });
  document.getElementById('modal-precios-body').innerHTML = html;
  document.getElementById('modal-total').textContent = '0,00 €';
  document.getElementById('modal-precios').classList.add('open');
  setTimeout(()=>document.getElementById('pi-0')?.focus(), 250);
}

function recalcTotal(){
  let total = 0;
  _modalDoneItems.forEach((_,idx) => {
    const v = parseFloat(document.getElementById('pi-'+idx)?.value||0);
    if(!isNaN(v)) total += v;
  });
  document.getElementById('modal-total').textContent =
    total.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}

function closeModalPrecios(e){
  if(e && e.target !== document.getElementById('modal-precios')) return;
  document.getElementById('modal-precios').classList.remove('open');
  _archivarYLimpiar(_modalDoneItems);
  _modalDoneItems = [];
}

function confirmarGastoCompra(){
  let total = 0;
  const itemsConPrecio = _modalDoneItems.map((item,idx) => {
    const precio = parseFloat(document.getElementById('pi-'+idx)?.value||0)||0;
    total += precio;
    return {...item, precio};
  });

  if(total > 0 && typeof WStore !== 'undefined'){
    const gastosData = WStore.get('gastos','data') ||
      (() => { try{const r=localStorage.getItem('gastos_v1');if(r)return JSON.parse(r);}catch(e){} return {gastos:[],budgets:{},nextId:1}; })();
    const list = state.lists.find(l=>l.id===activeListId);
    const today = new Date().toISOString().slice(0,10);
    gastosData.gastos = gastosData.gastos || [];
    let nidG = gastosData.nextId || 1;

    const conPrecio = itemsConPrecio.filter(i=>i.precio>0);
    if(conPrecio.length === 1){
      gastosData.gastos.push({id:++nidG, importe:total,
        concepto:`${list?.name||'Compra'} — ${conPrecio[0].text}`, fecha:today, cat:'super', nota:''});
    } else {
      conPrecio.forEach(item => {
        gastosData.gastos.push({id:++nidG, importe:item.precio,
          concepto:item.qty ? `${item.qty} ${item.text}` : item.text,
          fecha:today, cat:'super', nota:list?.name||'Compra'});
      });
    }
    gastosData.nextId = nidG;

    WStore.set('gastos','data', gastosData);
    try { localStorage.setItem('gastos_v1', JSON.stringify(gastosData)); } catch(e){}
  }

  _archivarYLimpiar(itemsConPrecio);
  document.getElementById('modal-precios').classList.remove('open');
  _modalDoneItems = [];
  _showToast(total > 0
    ? `✓ ${total.toLocaleString('es-ES',{minimumFractionDigits:2})} € registrados en Gastos`
    : '✓ Lista completada y archivada');
}

function _showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg2);border:0.5px solid var(--border2);color:var(--text);font-family:var(--fm);font-size:12px;padding:10px 18px;border-radius:99px;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:opacity 0.3s;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2800);
}

// ── UNITS & QTY HELPERS ──
const UNITS = ['uds','kg','g','L','mL','paq.','bote','lata','bolsa'];

function extractNum(qty){
  if(!qty) return '';
  const m = String(qty).match(/^([\d.,]+)/);
  return m ? m[1] : '';
}
function extractUnit(qty){
  if(!qty) return 'uds';
  const parts = String(qty).trim().split(/\s+/);
  if(parts.length > 1) return parts[parts.length-1];
  // If the whole string is a unit with no number, return it
  return UNITS.includes(parts[0]) ? parts[0] : 'uds';
}
function buildQty(num, unit){
  if(!num || num === '0') return '';
  return `${num} ${unit}`;
}

function openQtyEdit(id, e){
  e.stopPropagation();
  document.querySelectorAll('[id^="qe-"]').forEach(el=>{
    if(el.id !== 'qe-'+id) el.style.display='none';
  });
  const el = document.getElementById('qe-'+id);
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(!isOpen) setTimeout(()=>document.getElementById('qe-num-'+id)?.focus(), 50);
}

function saveQtyEdit(id){
  const item = state.items.find(x=>x.id===id); if(!item) return;
  const num = document.getElementById('qe-num-'+id)?.value.trim();
  const unit = document.getElementById('qe-unit-'+id)?.value || 'uds';
  item.qty = buildQty(num, unit);
  item.unit = num ? unit : '';
  const el = document.getElementById('qe-'+id);
  if(el) el.style.display='none';
  save(); render();
}

// ── BRIDGE: recibir ítem desde Despensa con qty+unit ──
window.addItemFromDespensa = function(data){
  if(!activeListId) return;
  const qty = data.qty && data.unit ? `${data.qty} ${data.unit}` : (data.qty||'');
  state.items.push({id:nxtId(), listId:activeListId,
    text:data.text||'', cat:data.cat||'otros',
    qty, unit:data.unit||'', done:false, store:''});
  save(); render();
  // Switch to compra tab
  showTab('compra', document.querySelector('.tab'));
};

// ── Sync desde Firebase al autenticarse (fix: auth puede llegar tarde) ──

  WStore.syncOnLoad('compra', 'data', fresh => {
    if (fresh && fresh.items) { state = fresh; nid = state.nextId||1; render(); }

      if (fresh && fresh.items) { state = fresh; nid = state.nextId||1; render(); }

    updateSyncUI(_fb()?.isOnline() ? 'online' : 'offline', _sync()?.getPending().length ?? 0);

const _loadEl = document.getElementById('wapp-loading');
if(_loadEl){ _loadEl.classList.add('fade'); setTimeout(()=>_loadEl.remove(), 350); }

async function manualSync(){
  const fb=_fb(),sync=_sync();if(!fb||!sync)return;
  const user=fb.getUser();if(!user||!fb.isOnline())return;
  const btn=document.getElementById('sync-btn');
  const originalText = btn?.textContent || '↑ SYNC';
  updateSyncUI('syncing',sync.getPending().length);
  if(btn)btn.disabled=true;
  const result = await sync.syncAll(user.uid);
  updateSyncUI(fb.isOnline()?'online':'offline',sync.getPending().length);
  if(btn){
    const {pushed=0,failed=0}=result||{};
    if(pushed===0 && failed===0) btn.textContent='✓ Al día';
    else if(failed>0) btn.textContent=`⚠ ${pushed}/${pushed+failed}`;
    else btn.textContent=`✓ ${pushed}`;
    setTimeout(()=>{if(btn)btn.textContent=originalText;},2500);
  }
}


window.addEventListener('wapps:online',      () => updateSyncUI('online',  _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:offline',     () => updateSyncUI('offline', _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:sync-start',  () => updateSyncUI('syncing', _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:sync-done',   () => { const fb=_fb(); updateSyncUI(fb?(fb.isOnline()?'online':'offline'):'offline', _sync()?.getPending().length??0); });
window.addEventListener('wapps:pending-change', e => {
  const fb=_fb(); const label=document.getElementById('sync-label');
  const isSyncing=label?.className?.includes('syncing');
  const state=isSyncing?'syncing':(fb?(fb.isOnline()?'online':'offline'):'offline');
  updateSyncUI(state, e.detail.pending.length);
});
