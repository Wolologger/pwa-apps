<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a09">
<title>Suministros — W//APPS</title>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<script src="wapps-config.js"></script>
<script src="wapps-store.js"></script>
<script src="wapps-firebase.js"></script>
<script src="wapps-onboarding.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;
  --y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;--o:#f09030;
  --luz:#f0c030;--gas:#f07030;--agua:#30b8f0;
  --fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;--fs:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fs);overflow-x:hidden;}

/* NAV */
.wnav{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-shrink:0;}
.wnav-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--y);background:rgba(232,240,64,0.08);color:var(--y);text-decoration:none;transition:all 0.15s;flex-shrink:0;}
.wnav-logo{font-family:var(--fh);font-size:16px;letter-spacing:2px;line-height:1;flex-shrink:0;}
.wnav-logo a{color:var(--muted);text-decoration:none;}
.wnav-logo a span{color:var(--y);}
.wnav-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.wnav-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
.wnav-version{font-size:9px;color:var(--dim);font-family:var(--fm);letter-spacing:0.5px;border:1px solid var(--dim);padding:2px 6px;border-radius:3px;flex-shrink:0;}

.shell{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;}

.tipo-bar{display:flex;padding:10px 16px;gap:6px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg);}
.tipo-btn{flex:1;padding:8px 0;font-family:var(--fh);font-size:15px;letter-spacing:1px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center;}
.tipo-btn.active{border-color:var(--y);color:var(--y);background:rgba(232,240,64,0.05);}
.tipo-btn.active-luz{background:rgba(240,192,48,0.15);color:var(--luz);border-color:rgba(240,192,48,0.35);}
.tipo-btn.active-gas{background:rgba(240,112,48,0.15);color:var(--gas);border-color:rgba(240,112,48,0.35);}
.tipo-btn.active-agua{background:rgba(48,184,240,0.15);color:var(--agua);border-color:rgba(48,184,240,0.35);}

.tabs{display:flex;padding:0 16px;gap:2px;border-bottom:1px solid var(--border2);flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--bg);}
.tab{flex-shrink:0;padding:9px 14px;font-size:11px;font-family:var(--fm);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.tab.active{color:var(--y);border-bottom-color:var(--y);}

.content{flex:1;overflow-y:auto;padding:0 16px 100px;scrollbar-width:none;}
.section{display:none;padding-top:14px;}
.section.active{display:block;}

.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--bg2);min-height:34px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sync-dot.online{background:var(--g);box-shadow:0 0 5px var(--g);}
.sync-dot.offline{background:var(--r);}
.sync-dot.syncing{background:var(--y);animation:pulse 0.8s ease-in-out infinite;}
.sync-label{color:var(--muted);}
.sync-label.online{color:var(--g);}
.sync-label.offline{color:var(--r);}
.sync-label.syncing{color:var(--y);}
.sync-btn{background:transparent;border:0.5px solid var(--dim);color:var(--muted);font-family:var(--fm);font-size:9px;letter-spacing:1px;padding:3px 9px;cursor:pointer;transition:all 0.15s;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.fab-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;padding:12px 16px 24px;background:linear-gradient(to top,var(--bg) 60%,transparent);pointer-events:none;}
.fab{pointer-events:all;width:100%;padding:13px;font-family:var(--fh);font-size:14px;font-weight:600;background:var(--y);color:#0a0a09;border:none;border-radius:12px;cursor:pointer;width:100%;}
</style>
</head>
<body>

<div class="shell">
  <div class="wnav">
    <a class="wnav-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="var(--y)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="wnav-logo"><a href="index.html">W<span>//</span>APPS</a></div>
    <div class="wnav-sep"></div>
    <div class="wnav-title">SUMINISTROS</div>
    <div class="wnav-version">v1.2</div>
  </div>

  <div class="sync-bar" id="sync-bar">
    <div class="sync-status">
      <div class="sync-dot offline" id="sync-dot"></div>
      <span class="sync-label offline" id="sync-label">OFFLINE</span>
      <span class="sync-pending" id="sync-pending"></span>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="sync-btn" id="pull-btn" onclick="manualPull()" disabled>↓ PULL</button>
      <button class="sync-btn" id="sync-btn" onclick="manualSync()" disabled>↑ SYNC</button>
      <button class="sync-btn" id="push-app-btn" onclick="manualPushApp()">⬆ SUBIR</button>
    </div>
  </div>

  <div class="tipo-bar" id="tipo-bar">
    <button class="tipo-btn active" id="btn-todos" onclick="setTipo('todos')">TODOS</button>
    <button class="tipo-btn" id="btn-luz" onclick="setTipo('luz')">⚡ LUZ</button>
    <button class="tipo-btn" id="btn-gas" onclick="setTipo('gas')">🔥 GAS</button>
    <button class="tipo-btn" id="btn-agua" onclick="setTipo('agua')">💧 AGUA</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('facturas',this)">Facturas</button>
    <button class="tab" onclick="showTab('graficas',this)">Gráficas</button>
    <button class="tab" onclick="showTab('resumen',this)">Resumen</button>
    <button class="tab" onclick="showTab('guias',this)">📖 Guías</button>
  </div>

  <div class="content">
    <div id="facturas" class="section active">
        <div id="facturas-body"></div>
    </div>
    <div id="graficas" class="section">
       <canvas id="chart-importe"></canvas>
    </div>
    <div id="resumen" class="section">
       <div id="resumen-body"></div>
    </div>
    <div id="guias" class="section">
       <div id="guias-list"></div>
    </div>
  </div>

  <div class="fab-area">
    <button class="fab" onclick="openAdd()">+ NUEVA FACTURA</button>
  </div>
</div>

<script>
// --- TUS FUNCIONES ORIGINALES (IDÉNTICAS) ---
function updateSyncUI(status, pendingCount = 0) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  const pullBtn = document.getElementById('pull-btn');
  const syncBtn = document.getElementById('sync-btn');
  if(!dot || !label) return;
  dot.className = 'sync-dot ' + status;
  label.className = 'sync-label ' + status;
  label.innerText = status.toUpperCase();
  const isOnline = (status === 'online' || status === 'syncing');
  if(pullBtn) pullBtn.disabled = !isOnline;
  if(syncBtn) syncBtn.disabled = !isOnline;
}

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// CHEQUEO INICIAL (Única corrección)
document.addEventListener('DOMContentLoaded', () => {
    updateSyncUI(navigator.onLine ? 'online' : 'offline');
});
window.addEventListener('online', () => updateSyncUI('online'));
window.addEventListener('offline', () => updateSyncUI('offline'));
</script>

</body>
</html>
