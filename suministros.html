<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a09">
    <title>Suministros — W//APPS</title>
    
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <script src="wapps-config.js"></script>
    <script src="wapps-store.js"></script>
    <script src="wapps-firebase.js"></script>
    <script src="wapps-onboarding.js"></script>

    <style>
        :root{
            --bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;
            --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
            --text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;
            --y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;--o:#f09030;
            --luz:#f0c030;--gas:#f07030;--agua:#30b8f0;
            --fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;--fs:'DM Sans',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fs);overflow-x:hidden;}

        /* NAV & SYNC BAR */
        .wnav{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;}
        .wnav-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--y);background:rgba(232,240,64,0.08);color:var(--y);text-decoration:none;}
        .wnav-logo{font-family:var(--fh);font-size:16px;letter-spacing:2px;}
        .wnav-logo a{color:var(--muted);text-decoration:none;}
        .wnav-logo a span{color:var(--y);}
        .wnav-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
        
        .sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--bg2);min-height:34px;}
        .sync-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;}
        .sync-dot{width:6px;height:6px;border-radius:50%;}
        .sync-dot.online{background:var(--g); box-shadow: 0 0 5px var(--g);}
        .sync-dot.offline{background:var(--r);}
        .sync-label.online{color:var(--g);}
        .sync-label.offline{color:var(--r);}

        /* BOTONES SYNC */
        .sync-btn{background:transparent;border:0.5px solid var(--dim);color:var(--muted);font-family:var(--fm);font-size:9px;padding:3px 9px;cursor:pointer;}
        .sync-btn:not(:disabled):hover{border-color:var(--y);color:var(--y);}
        .sync-btn:disabled{opacity:0.3;cursor:not-allowed;}

        /* TABS & SECTIONS */
        .shell{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto;}
        .tabs{display:flex;padding:0 16px;gap:2px;border-bottom:1px solid var(--border2);background:var(--bg);position:sticky;top:85px;z-index:90;}
        .tab{padding:12px;font-size:11px;font-family:var(--fm);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
        .tab.active{color:var(--y);border-bottom-color:var(--y);}
        .content{flex:1;padding:16px;}
        .section{display:none;}
        .section.active{display:block;}

        /* ESTILOS DE TIPO BAR */
        .tipo-bar{display:flex;padding:10px 16px;gap:6px;border-bottom:1px solid var(--border2);}
        .tipo-btn{flex:1;padding:8px;font-family:var(--fh);font-size:14px;border:1px solid var(--border2);background:transparent;color:var(--muted);border-radius:8px;}
        .tipo-btn.active{border-color:var(--y);color:var(--y);background:rgba(232,240,64,0.05);}

        /* GUIAS */
        .guia-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;}
        .guia-content{display:none;}
        .guia-content.active{display:block;}
    </style>
</head>
<body>

<div class="shell">
    <div class="wnav">
        <a class="wnav-back" href="index.html">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <div class="wnav-logo"><a href="#">W<span>//</span>APPS</a></div>
        <div class="wnav-title">SUMINISTROS</div>
        <div class="wnav-version">v1.2</div>
    </div>

    <div class="sync-bar">
        <div class="sync-status">
            <div class="sync-dot offline" id="sync-dot"></div>
            <span class="sync-label offline" id="sync-label">OFFLINE</span>
        </div>
        <div style="display:flex;gap:6px;">
            <button class="sync-btn" id="pull-btn" onclick="manualPull()" disabled>↓ PULL</button>
            <button class="sync-btn" id="sync-btn" onclick="manualSync()" disabled>↑ SYNC</button>
        </div>
    </div>

    <div class="tipo-bar" id="tipo-bar">
        <button class="tipo-btn active" onclick="setTipo('todos', this)">TODOS</button>
        <button class="tipo-btn" onclick="setTipo('luz', this)">⚡ LUZ</button>
        <button class="tipo-btn" onclick="setTipo('gas', this)">🔥 GAS</button>
        <button class="tipo-btn" onclick="setTipo('agua', this)">💧 AGUA</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('facturas', this)">Facturas</button>
        <button class="tab" onclick="showTab('graficas', this)">Gráficas</button>
        <button class="tab" onclick="showTab('guias', this)">📖 Guías</button>
    </div>

    <div class="content">
        <div id="facturas" class="section active">
            <div id="facturas-body">
                <p style="color:var(--muted);text-align:center;margin-top:20px;">Cargando facturas...</p>
            </div>
        </div>

        <div id="graficas" class="section">
            <canvas id="chart-importe"></canvas>
        </div>

        <div id="guias" class="section">
            <div id="guias-list">
                <div class="guia-card" onclick="openGuia('luz')">
                    <h3>⚡ Factura de la Luz</h3>
                    <p>Entiende los conceptos de potencia y energía.</p>
                </div>
            </div>
            
            <div id="guia-luz" class="guia-content">
                <button onclick="closeGuia()" style="background:none;border:none;color:var(--y);cursor:pointer;margin-bottom:10px;">← Volver</button>
                <h2>Detalle Luz</h2>
                <p>Aquí va la información detallada de la luz...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. GESTIÓN DE CONEXIÓN (Arregla el problema de "siempre offline")
    function updateOnlineStatus() {
        const dot = document.getElementById('sync-dot');
        const label = document.getElementById('sync-label');
        const pullBtn = document.getElementById('pull-btn');
        const syncBtn = document.getElementById('sync-btn');
        const isOnline = navigator.onLine;

        if (isOnline) {
            dot.className = 'sync-dot online';
            label.className = 'sync-label online';
            label.innerText = 'ONLINE';
            pullBtn.disabled = false;
            syncBtn.disabled = false;
        } else {
            dot.className = 'sync-dot offline';
            label.className = 'sync-label offline';
            label.innerText = 'OFFLINE';
            pullBtn.disabled = true;
            syncBtn.disabled = true;
        }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    // 2. NAVEGACIÓN DE TABS
    function showTab(tabId, btn) {
        // Ocultar secciones
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        // Desactivar botones
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');

        // Mostrar/ocultar selector de tipo según la pestaña
        const tipoBar = document.getElementById('tipo-bar');
        if(tabId === 'guias') tipoBar.style.display = 'none';
        else tipoBar.style.display = 'flex';
    }

    // 3. FILTROS DE TIPO
    function setTipo(tipo, btn) {
        document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        console.log("Filtrando por:", tipo);
        // Aquí llamarías a tu función de filtrado en wapps-store.js si existe
    }

    // 4. GESTIÓN DE GUÍAS
    function openGuia(id) {
        document.getElementById('guias-list').style.display = 'none';
        document.getElementById('guia-' + id).classList.add('active');
    }

    function closeGuia() {
        document.querySelectorAll('.guia-content').forEach(g => g.classList.remove('active'));
        document.getElementById('guias-list').style.display = 'block';
    }

    // Funciones Placeholder para que no den error si los scripts externos tardan en cargar
    function manualPull() { if(window.wappsFirebase) wappsFirebase.pull(); else alert("Sincronizando..."); }
    function manualSync() { if(window.wappsFirebase) wappsFirebase.sync(); else alert("Subiendo datos..."); }

    // Al cargar
    document.addEventListener('DOMContentLoaded', () => {
        updateOnlineStatus();
    });
</script>

</body>
</html>
