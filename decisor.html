<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a09">
<title>Decisor — W//APPS</title>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<script src="wapps-config.js"></script>
<script src="wapps-store.js"></script>
<script src="wapps-firebase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;--y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;--fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);overflow-x:hidden;}
.wnav{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;}
.wnav-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--y);background:rgba(232,240,64,0.08);color:var(--y);text-decoration:none;transition:all 0.15s;}
.wnav-back:hover{background:rgba(232,240,64,0.18);color:var(--y);}
.wnav-logo{font-family:var(--fh);font-size:16px;letter-spacing:2px;}
.wnav-logo a{color:var(--muted);text-decoration:none;}
.wnav-logo a span{color:var(--y);}
.wnav-sep{width:1px;height:16px;background:var(--border2);}
.wnav-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
.tabs{display:flex;padding:0 16px;gap:2px;border-bottom:1px solid var(--border2);}
.tab{flex-shrink:0;padding:9px 14px;font-size:11px;font-family:var(--fm);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.tab.active{color:var(--y);border-bottom-color:var(--y);}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
.content{flex:1;overflow-y:auto;padding:0 16px 60px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.section{display:none;padding-top:16px;}
.section.active{display:block;}

/* DECISOR */
.result-area{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0 16px;min-height:160px;}
.result-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.result-text{font-family:var(--fh);font-size:clamp(28px,10vw,52px);letter-spacing:1px;text-align:center;line-height:1.1;min-height:56px;display:flex;align-items:center;justify-content:center;padding:0 8px;}
.result-text.spinning{color:var(--muted);animation:flicker 0.1s infinite;}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.4}}
.result-text.final{color:var(--y);animation:pop 0.3s ease;}
@keyframes pop{0%{transform:scale(0.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
.result-hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;letter-spacing:0.5px;}
.decide-btn{width:100%;padding:16px;font-family:var(--fh);font-size:22px;letter-spacing:2px;background:var(--y);color:#0a0a09;border:none;border-radius:12px;cursor:pointer;transition:transform 0.1s;margin-bottom:16px;}
.decide-btn:active{transform:scale(0.97);}
.decide-btn:disabled{opacity:0.4;cursor:not-allowed;}
.section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px;font-family:var(--fm);}
.options-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.options-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto;scrollbar-width:none;}
.options-list::-webkit-scrollbar{display:none;}
.option-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;}
.option-text{flex:1;font-size:13px;}
.option-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;opacity:0.35;}
.option-del:hover{opacity:1;color:var(--r);}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:10px 12px;outline:none;}
.add-input:focus{border-color:var(--y);}
.add-btn{background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:10px 16px;cursor:pointer;}
.add-btn:hover{background:var(--bg3);}
.history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.history-item:last-child{border-bottom:none;}
.history-val{color:var(--text);}
.history-time{color:var(--muted);font-size:10px;}

/* PRESETS */
.preset-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.preset-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.preset-name-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:13px;padding:6px 10px;outline:none;}
.preset-name-input:focus{border-color:var(--y);}
.preset-name-display{flex:1;font-size:13px;font-weight:500;}
.preset-opts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.preset-opt-chip{padding:4px 10px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:99px;font-size:11px;display:flex;align-items:center;gap:5px;}
.preset-opt-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;opacity:0.4;line-height:1;}
.preset-opt-del:hover{opacity:1;color:var(--r);}
.preset-add-row{display:flex;gap:6px;}
.preset-add-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:12px;padding:6px 10px;outline:none;}
.preset-add-input:focus{border-color:var(--y);}
.btn{padding:7px 13px;font-size:11px;font-family:var(--fm);border:0.5px solid var(--border2);border-radius:7px;background:transparent;color:var(--text);cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.btn:hover{background:var(--bg3);}
.btn-y{background:var(--y);color:#0a0a09;border-color:var(--y);font-family:var(--fh);font-size:15px;letter-spacing:1px;}
.btn-r{background:var(--r);color:#fff;border-color:var(--r);font-weight:500;}
.btn-b{border-color:rgba(48,168,240,0.3);color:var(--b);}
.new-preset-row{display:flex;gap:8px;margin-top:8px;}
.new-preset-input{flex:1;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:9px 12px;outline:none;}
.new-preset-input:focus{border-color:var(--y);}

/* DATOS */
.data-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px;}
.fb{font-size:11px;margin-top:8px;display:none;}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:2rem 1rem;}

.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--bg2,#141412);min-height:34px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sync-dot.online{background:var(--g,#30d880);}
.sync-dot.offline{background:var(--r,#f04030);}
.sync-dot.syncing{background:var(--y,#e8f040);animation:pulse 0.8s ease-in-out infinite;}
.sync-label{color:var(--muted,#5a5850);}
.sync-label.online{color:var(--g,#30d880);}
.sync-label.offline{color:var(--r,#f04030);}
.sync-label.syncing{color:var(--y,#e8f040);}
.sync-pending{font-size:9px;color:var(--y,#e8f040);letter-spacing:0.5px;}
.sync-btn{background:transparent;border:0.5px solid var(--dim,#2a2a26);color:var(--muted,#5a5850);font-family:var(--fm);font-size:9px;letter-spacing:1px;padding:3px 9px;cursor:pointer;transition:all 0.15s;}
.sync-btn:hover:not(:disabled){border-color:var(--y,#e8f040);color:var(--y,#e8f040);}
.sync-btn:disabled{opacity:0.35;cursor:default;}
</style>
</head>
<body>
<div class="shell">
  <div class="wnav">
    <a class="wnav-back" href="index.html"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="var(--y)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    <div class="wnav-logo"><a href="index.html">W<span>//</span>APPS</a></div>
    <div class="wnav-sep"></div>
    <div class="wnav-title">DECISOR</div>
  </div>
  <div class="sync-bar" id="sync-bar">
    <div class="sync-status">
      <div class="sync-dot offline" id="sync-dot"></div>
      <span class="sync-label offline" id="sync-label">OFFLINE</span>
      <span class="sync-pending" id="sync-pending"></span>
    </div>
    <div style="display:flex;gap:6px;">
    <button class="sync-btn" id="pull-btn" onclick="manualPull()" disabled>↓ PULL</button>
    <button class="sync-btn" id="sync-btn" onclick="manualSync()" disabled>↑ SYNC</button>
  </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('decidir',this)">Decidir</button>
    <button class="tab" onclick="showTab('presets',this)">Presets</button>
    <button class="tab" onclick="showTab('datos',this)">Datos</button>
  </div>
  <div class="content">
    <div id="decidir" class="section active">
      <div class="result-area">
        <div class="result-label" id="result-label">¿Qué decidimos?</div>
        <div class="result-text" id="result-text">—</div>
        <div class="result-hint" id="result-hint">Añade opciones y pulsa decidir</div>
      </div>
      <button class="decide-btn" id="decide-btn" onclick="decidir()" disabled>DECIDIR</button>
      <div class="options-header">
        <div class="section-label" style="margin:0">Opciones (<span id="opt-count">0</span>)</div>
        <button class="btn btn-r" style="font-size:10px;padding:4px 9px;" onclick="clearAll()">Limpiar</button>
      </div>
      <div class="options-list" id="options-list"></div>
      <div class="add-row">
        <input class="add-input" id="add-input" placeholder="Añadir opción…" onkeydown="if(event.key==='Enter')addOption()">
        <button class="add-btn" onclick="addOption()">+</button>
      </div>
      <div class="section-label">Cargar preset</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="preset-chips"></div>
      <div id="history-area"></div>
    </div>

    <div id="presets" class="section">
      <div id="presets-body"></div>
      <div class="section-label">Nuevo preset</div>
      <div class="new-preset-row">
        <input class="new-preset-input" id="new-preset-name" placeholder="Nombre del preset…" onkeydown="if(event.key==='Enter')addPreset()">
        <button class="btn btn-y" onclick="addPreset()">+ Crear</button>
      </div>
    </div>

    <div id="datos" class="section">
      <div class="data-card">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;margin-bottom:6px;">Exportar / Importar</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;" id="datos-info"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-y" style="flex:1" onclick="exportJSON()">↓ Exportar</button>
          <button class="btn" style="flex:1" onclick="document.getElementById('fi').click()">↑ Importar</button>
          <input type="file" id="fi" accept=".json" style="display:none" onchange="importFile(event)">
        </div>
        <div id="datos-fb" class="fb"></div>
      </div>
    </div>
  </div>
</div>
<script>
const DEFAULT_PRESETS=[
  {id:1,name:'Sí / No',opts:['Sí','No']},
  {id:2,name:'Moneda',opts:['Cara','Cruz']},
  {id:3,name:'Dado 6',opts:['1','2','3','4','5','6']},
];

let state=loadState(),options=[],history=[],spinning=false,currentTab='decidir';

function loadState(){
  // Preferimos WStore (sincroniza con Firebase). Fallback a clave legacy.
  if (typeof WStore !== 'undefined') {
    const w = WStore.get('decisor','data');
    if (w && w.presets) return w;
  }
  try{const r=localStorage.getItem('decisor_v1');if(r)return JSON.parse(r);}catch(e){}
  return{presets:JSON.parse(JSON.stringify(DEFAULT_PRESETS)),nextId:10};
}
function save(){
  if (typeof WStore !== 'undefined') {
    try { WStore.set('decisor','data',state); return; } catch(e){}
  }
  try{localStorage.setItem('decisor_v1',JSON.stringify(state));}catch(e){}
}
function nxtId(){return++(state.nextId);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showTab(name,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');el.classList.add('active');
  currentTab=name;render();
}

function render(){
  if(currentTab==='decidir')renderDecidir();
  if(currentTab==='presets')renderPresets();
  if(currentTab==='datos')renderDatos();
}

function renderDecidir(){
  // Options list
  document.getElementById('options-list').innerHTML=options.map((o,i)=>
    `<div class="option-row"><span class="option-text">${esc(o)}</span><button class="option-del" onclick="removeOption(${i})">×</button></div>`
  ).join('');
  document.getElementById('opt-count').textContent=options.length;
  document.getElementById('decide-btn').disabled=options.length<2||spinning;

  // Preset chips
  document.getElementById('preset-chips').innerHTML=state.presets.map(p=>
    `<button style="padding:5px 12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:99px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--fm);" onmouseenter="this.style.color='var(--text)'" onmouseleave="this.style.color='var(--muted)'" onclick="loadPreset(${p.id})">${esc(p.name)}</button>`
  ).join('');

  // History
  if(history.length){
    document.getElementById('history-area').innerHTML=
      `<div class="section-label">Últimas decisiones</div>`+
      history.map(h=>`<div class="history-item"><span class="history-val">${esc(h.val)}</span><span class="history-time">${h.time}</span></div>`).join('');
  }
}

function renderPresets(){
  let html='';
  state.presets.forEach(p=>{
    html+=`<div class="preset-card">
      <div class="preset-header">
        <input class="preset-name-input" id="pn-${p.id}" value="${esc(p.name)}" onchange="updatePresetName(${p.id},this.value)">
        <button class="btn btn-b" style="font-size:10px;padding:4px 10px;" onclick="loadPreset(${p.id});showTab('decidir',document.querySelectorAll('.tab')[0])">Usar →</button>
        <button class="btn btn-r" style="font-size:10px;padding:4px 9px;" onclick="delPreset(${p.id})">✕</button>
      </div>
      <div class="preset-opts" id="po-${p.id}">
        ${p.opts.map((o,i)=>`<div class="preset-opt-chip">${esc(o)}<button class="preset-opt-del" onclick="delPresetOpt(${p.id},${i})">×</button></div>`).join('')}
      </div>
      <div class="preset-add-row">
        <input class="preset-add-input" id="pai-${p.id}" placeholder="Nueva opción…" onkeydown="if(event.key==='Enter')addPresetOpt(${p.id})">
        <button class="btn" style="padding:5px 10px;font-size:11px;" onclick="addPresetOpt(${p.id})">+</button>
      </div>
    </div>`;
  });
  if(!html)html='<div class="empty">Sin presets. Crea uno abajo.</div>';
  document.getElementById('presets-body').innerHTML=html;
}

function renderDatos(){
  document.getElementById('datos-info').textContent=`${state.presets.length} presets guardados`;
}

function addOption(){const inp=document.getElementById('add-input');const txt=inp.value.trim();if(!txt)return;options.push(txt);inp.value='';renderDecidir();inp.focus();}
function removeOption(i){options.splice(i,1);renderDecidir();}
function clearAll(){options=[];document.getElementById('result-text').textContent='—';document.getElementById('result-text').className='result-text';document.getElementById('result-label').textContent='¿Qué decidimos?';document.getElementById('result-hint').textContent='Añade opciones y pulsa decidir';renderDecidir();}
function loadPreset(id){const p=state.presets.find(x=>x.id===id);if(p)options=[...p.opts];renderDecidir();}

function decidir(){
  if(options.length<2||spinning)return;
  spinning=true;document.getElementById('decide-btn').disabled=true;
  const result=document.getElementById('result-text');
  result.className='result-text spinning';
  document.getElementById('result-label').textContent='Decidiendo…';
  document.getElementById('result-hint').textContent='';
  let count=0;const total=18+Math.floor(Math.random()*10);
  const iv=setInterval(()=>{
    result.textContent=options[Math.floor(Math.random()*options.length)];
    count++;
    if(count>=total){
      clearInterval(iv);
      const winner=options[Math.floor(Math.random()*options.length)];
      result.textContent=winner;result.className='result-text final';
      document.getElementById('result-label').textContent='La decisión es…';
      document.getElementById('result-hint').textContent='Pulsa decidir para volver a elegir';
      spinning=false;document.getElementById('decide-btn').disabled=false;
      history.unshift({val:winner,time:new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})});
      if(history.length>5)history.pop();
      renderDecidir();
    }
  },80+(count/total)*60);
}

// Preset management
function addPreset(){
  const name=document.getElementById('new-preset-name').value.trim();if(!name)return;
  state.presets.push({id:nxtId(),name,opts:[]});
  document.getElementById('new-preset-name').value='';
  save();render();
}
function delPreset(id){if(!confirm('¿Eliminar preset?'))return;state.presets=state.presets.filter(p=>p.id!==id);save();render();}
function updatePresetName(id,val){const p=state.presets.find(x=>x.id===id);if(p){p.name=val;save();}}
function addPresetOpt(id){
  const inp=document.getElementById('pai-'+id);const txt=inp.value.trim();if(!txt)return;
  const p=state.presets.find(x=>x.id===id);if(p){p.opts.push(txt);inp.value='';save();renderPresets();}
}
function delPresetOpt(id,idx){const p=state.presets.find(x=>x.id===id);if(p){p.opts.splice(idx,1);save();renderPresets();}}

// Data
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download='decisor-presets.json';a.click();
  showFB('Descargado ✓','var(--g)');
}
function importFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const p=JSON.parse(ev.target.result);if(!p.presets)throw new Error('Formato inválido');if(!confirm(`¿Importar ${p.presets.length} presets?`))return;state=p;save();render();showFB('Importado ✓','var(--g)');}
    catch(err){showFB('Error: '+err.message,'var(--r)');}
  };r.readAsText(f);
}
function showFB(msg,color){const el=document.getElementById('datos-fb');if(!el)return;el.textContent=msg;el.style.color=color;el.style.display='block';setTimeout(()=>el.style.display='none',2500);}

render();
</script>
<script>
// WTransition inline (fallback; wapps-store.js ya provee uno, pero este es defensivo)
(function(){
  const D=160;
  function go(url){document.body.style.transition='opacity '+D+'ms ease';document.body.style.opacity='0';setTimeout(()=>{window.location.href=url;},D);}
  function intercept(){document.addEventListener('click',e=>{const a=e.target.closest('a[href]');if(!a)return;const h=a.getAttribute('href');if(!h||!h.endsWith('.html')||h.startsWith('http')||a.target)return;e.preventDefault();go(h);},true);}
  function fadeIn(){document.body.style.opacity='0';document.body.style.transition='none';requestAnimationFrame(()=>{requestAnimationFrame(()=>{document.body.style.transition='opacity '+D+'ms ease';document.body.style.opacity='1';});});}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>{intercept();fadeIn();});}else{intercept();fadeIn();}
  window.WTransition={go};
})();

function _fb()   { return (typeof WFirebase !== 'undefined') ? WFirebase : null; }
function _sync() { return (typeof WSync     !== 'undefined') ? WSync     : null; }
function updateSyncUI(state, pendingCount) {
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label'),btn=document.getElementById('sync-btn'),pend=document.getElementById('sync-pending');
  if(!dot)return;
  dot.className='sync-dot '+state; label.className='sync-label '+state;
  const labels={online:'ONLINE',offline:'OFFLINE',syncing:'SINCRONIZANDO...'};
  label.textContent=labels[state]||state.toUpperCase();
  pend.textContent=pendingCount>0?'· '+pendingCount+' PENDIENTE'+(pendingCount>1?'S':''):'';
  btn.disabled=!(state==='online'&&_fb()&&_fb().getUser()&&pendingCount>0);
}
async function manualSync(){
  const fb=_fb(),sync=_sync();if(!fb||!sync)return;
  const user=fb.getUser();if(!user||!fb.isOnline())return;
  updateSyncUI('syncing',sync.getPending().length);
  document.getElementById('sync-btn').disabled=true;
  await sync.syncAll(user.uid);
  updateSyncUI(fb.isOnline()?'online':'offline',sync.getPending().length);
}
async function manualPull() {
  const fb   = _fb();
  const sync = _sync();
  if (!fb || !sync) return;
  const user = fb.getUser();
  if (!user || !fb.isOnline()) return;
  const btn = document.getElementById('pull-btn');
  if (btn) btn.disabled = true;
  updateSyncUI('syncing', sync.getPending().length);
  await sync.pullAll(user.uid);
  updateSyncUI(fb.isOnline() ? 'online' : 'offline', sync.getPending().length);
  if (btn) btn.disabled = false;
  // Reload page to reflect pulled data
  window.location.reload();
}

window.addEventListener('wapps:online',()=>updateSyncUI('online',_sync()?.getPending().length??0));
window.addEventListener('wapps:offline',()=>updateSyncUI('offline',_sync()?.getPending().length??0));
window.addEventListener('wapps:sync-start',()=>updateSyncUI('syncing',_sync()?.getPending().length??0));
window.addEventListener('wapps:sync-done',()=>{const fb=_fb();updateSyncUI(fb?(fb.isOnline()?'online':'offline'):'offline',_sync()?.getPending().length??0);});
window.addEventListener('wapps:pending-change',e=>{const fb=_fb(),label=document.getElementById('sync-label');const isSyncing=label?.className?.includes('syncing');updateSyncUI(isSyncing?'syncing':(fb?(fb.isOnline()?'online':'offline'):'offline'),e.detail.pending.length);});
window.addEventListener('wapps:auth-change', e => {
  if (!e.detail?.user) return;
  if (typeof WStore !== 'undefined') {
    WStore.syncOnLoad('decisor','data', fresh => {
      if (fresh?.presets) { state = fresh; render(); }
    });
  }
  updateSyncUI(_fb()?.isOnline() ? 'online' : 'offline', _sync()?.getPending().length ?? 0);
});
window.addEventListener('wapps:recovered', () => {
  if (typeof WStore === 'undefined') return;
  const fresh = WStore.get('decisor','data');
  if (fresh?.presets) { state = fresh; render(); }
});
updateSyncUI(navigator.onLine?'online':'offline',0);
</script>
