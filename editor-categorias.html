<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a09">
<title>W // AJUSTES</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="wapps-firebase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;
  --line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.12);
  --text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;
  --y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;
  --fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fm);overflow-x:hidden;}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:40px 40px;}
.shell{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:0 0 40px;}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line2);}
.logo{font-family:var(--fh);font-size:26px;letter-spacing:2px;color:var(--text);line-height:1;text-decoration:none;}
.logo-slash{color:var(--y);}
.back-btn{font-size:10px;color:var(--muted);text-decoration:none;border:0.5px solid var(--dim);padding:5px 10px;letter-spacing:1px;transition:all 0.15s;}
.back-btn:hover{color:var(--y);border-color:var(--y);}

/* HERO */
.hero{padding:24px 20px 18px;border-bottom:1px solid var(--line2);}
.hero-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hero-title{font-family:var(--fh);font-size:clamp(36px,11vw,52px);line-height:0.95;letter-spacing:1px;margin-bottom:10px;}
.hero-title em{color:var(--y);font-style:normal;display:block;}
.hero-desc{font-size:11px;color:var(--muted);line-height:1.6;}

/* SECTION HEADER */
.section-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 8px;}
.section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.section-action{font-size:9px;color:var(--muted);cursor:pointer;letter-spacing:1px;background:none;border:none;font-family:var(--fm);padding:0;transition:color 0.15s;}
.section-action:hover{color:var(--y);}

/* APP ROWS */
.apps-section{padding:0 20px;display:flex;flex-direction:column;gap:1px;}

.app-row{background:var(--bg2);border:1px solid var(--line2);overflow:hidden;transition:border-color 0.2s,opacity 0.2s;}
.app-row.hidden-app{opacity:0.4;}

.app-row-inner{display:flex;align-items:stretch;}

.app-num{font-family:var(--fh);font-size:24px;color:var(--dim);padding:12px 10px 12px 14px;line-height:1;border-right:1px solid var(--line2);min-width:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color 0.2s;}
.app-row:not(.hidden-app) .app-num{color:var(--dim);}

.app-info{flex:1;padding:11px 14px;}
.app-name{font-family:var(--fh);font-size:18px;letter-spacing:0.5px;line-height:1;margin-bottom:3px;}
.app-file{font-size:9px;color:var(--dim);letter-spacing:0.5px;}
.app-tags-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.app-tag{font-size:9px;padding:2px 6px;border:1px solid var(--dim);color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}

/* TOGGLE SWITCH */
.toggle-wrap{padding:12px 16px;display:flex;align-items:center;flex-shrink:0;}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--dim);border-radius:20px;transition:background 0.2s;}
.toggle input:checked + .toggle-track{background:var(--y);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--muted);border-radius:50%;transition:transform 0.2s,background 0.2s;}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px);background:#0a0a09;}

/* RESET BTN */
.reset-btn{background:none;border:0.5px solid rgba(240,64,48,0.3);color:var(--r);font-family:var(--fm);font-size:9px;letter-spacing:0.5px;padding:3px 8px;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.reset-btn:hover{background:rgba(240,64,48,0.08);border-color:var(--r);}

/* HIDDEN BADGE */
.hidden-badge{font-size:9px;color:var(--r);letter-spacing:1px;margin-left:6px;}

/* ESTADO */
.state-msg{padding:28px 20px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px;}
.spinner{width:14px;height:14px;border:1.5px solid var(--dim);border-top-color:var(--y);border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER INFO */
.footer-note{padding:20px 20px 0;font-size:10px;color:var(--dim);line-height:1.6;border-top:1px solid var(--line2);margin-top:16px;}
.footer-note strong{color:var(--muted);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="shell">

  <div class="topbar">
    <a class="logo" href="index.html">W<span class="logo-slash">//</span>APPS</a>
    <a class="back-btn" href="index.html">← VOLVER</a>
  </div>

  <div class="hero">
    <div class="hero-label">Admin · v1.5</div>
    <div class="hero-title">AJUSTES<em>HERRAMIENTAS</em></div>
    <div class="hero-desc">Activa o desactiva herramientas en el panel principal. Los cambios se aplican al instante.</div>
  </div>

  <div class="section-hd">
    <div class="section-title" id="visible-count">Herramientas</div>
    <button class="section-action" onclick="showAll()">MOSTRAR TODAS</button>
  </div>

  <div class="apps-section" id="apps-list">
    <div class="state-msg"><div class="spinner"></div>Cargando…</div>
  </div>

  <div class="footer-note">
    <strong>↺ RESET</strong> — borra los datos de la app del dispositivo y de Firestore.<br>
    <strong>Toggle</strong> — oculta o muestra la herramienta en el panel principal.
  </div>

</div>
<script>
const GITHUB_USER = 'Wolologger';
const GITHUB_REPO = 'pwa-apps';
const STORAGE_KEY = 'pwa_hidden';

// Mapa de claves WStore por archivo (para borrar de Firestore)
const WKEYS = {
  'obra.html':           ['obra','data'],
  'gastos-diarios.html': ['gastos','data'],
  'suministros.html':    ['suministros','data'],
  'finanzas.html':       ['finanzas','data'],
  'despensa.html':       ['despensa','items'],
  'compra.html':         ['compra','data'],
  'setlist.html':        ['setlist','data'],
  'instrumentos.html':   ['instrumentos','data'],
  'semana.html':         ['semana','data'],
  'deseados.html':       ['deseados','data'],
  'decisor.html':        ['decisor','data'],
  'mascotas.html':       null,
};

const META = {
  'obra.html':             { name:'Mi Obra',       tags:['obra','finanzas'] },
  'gastos-diarios.html':   { name:'Gastos Diarios', tags:['dinero','diario'] },
  'suministros.html':      { name:'Suministros',    tags:['hogar','dinero'] },
  'finanzas.html':         { name:'Finanzas',        tags:['dinero'] },
  'despensa.html':         { name:'Despensa',        tags:['hogar','cocina'] },
  'compra.html':           { name:'Lista Compra',   tags:['hogar','cocina'] },
  'setlist.html':          { name:'Setlist',         tags:['música'] },
  'instrumentos.html':     { name:'Instrumentos',   tags:['música'] },
  'semana.html':           { name:'Semana',          tags:['productividad'] },
  'deseados.html':         { name:'Deseados',        tags:['dinero'] },
  'decisor.html':          { name:'Decisor',         tags:['utilidad'] },
};

let hidden = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let files = [];

function saveHidden() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...hidden]));
}

function toggleVisibility(filename, visible) {
  if (visible) hidden.delete(filename);
  else hidden.add(filename);
  saveHidden();

  // Update row appearance instantly
  const row = document.getElementById('row-' + filename.replace('.', '_'));
  if (row) row.classList.toggle('hidden-app', !visible);

  updateCount();
}

function showAll() {
  hidden.clear();
  saveHidden();
  files.forEach(f => {
    const row = document.getElementById('row-' + f.name.replace('.', '_'));
    if (row) {
      row.classList.remove('hidden-app');
      const inp = row.querySelector('input[type=checkbox]');
      if (inp) inp.checked = true;
    }
  });
  updateCount();
}

function updateCount() {
  const visible = files.length - hidden.size;
  document.getElementById('visible-count').textContent =
    `${visible} visible${visible !== 1 ? 's' : ''} · ${hidden.size} oculta${hidden.size !== 1 ? 's' : ''}`;
}

function renderApps() {
  const list = document.getElementById('apps-list');
  if (!files.length) return;

  list.innerHTML = files.map((f, i) => {
    const m = META[f.name] || { name: f.name.replace('.html','').replace(/[-_]/g,' ').toUpperCase(), tags: [] };
    const num = String(i + 1).padStart(2, '0');
    const isHidden = hidden.has(f.name);
    const tagsHtml = (m.tags || []).map(t => `<span class="app-tag">${t}</span>`).join('');
    const id = f.name.replace('.', '_');

    return `
      <div class="app-row${isHidden ? ' hidden-app' : ''}" id="row-${id}">
        <div class="app-row-inner">
          <div class="app-num">${num}</div>
          <div class="app-info">
            <div class="app-name">${m.name}${isHidden ? '<span class="hidden-badge">OCULTA</span>' : ''}</div>
            <div class="app-file">${f.name}</div>
            ${tagsHtml ? `<div class="app-tags-row">${tagsHtml}</div>` : ''}
          </div>
          <div class="toggle-wrap" style="gap:8px;">
            <button class="reset-btn" onclick="resetApp('${f.name}')" title="Borrar datos de esta app">↺ RESET</button>
            <label class="toggle">
              <input type="checkbox" ${isHidden ? '' : 'checked'}
                onchange="toggleVisibility('${f.name}', this.checked)">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>
        </div>
      </div>
    `;
  }).join('');

  updateCount();
}

async function resetApp(filename) {
  const m = META[filename] || { name: filename };
  const wkey = WKEYS[filename];

  if (!confirm(`¿Resetear todos los datos de "${m.name}"?\n\nSe borrará del dispositivo y de Firestore si hay sesión activa.`)) return;

  // 1. Borrar localStorage
  if (wkey) {
    try { localStorage.removeItem(`wapps.${wkey[0]}.${wkey[1]}`); } catch(e) {}
  }
  // Limpiar de WSync pending
  if (typeof WSync !== 'undefined' && wkey) {
    WSync.clearPending(`${wkey[0]}.${wkey[1]}`);
  }

  // 2. Borrar de Firestore
  let firestoreOk = false;
  if (wkey && typeof WFirebase !== 'undefined') {
    const user = WFirebase.getUser();
    if (user && WFirebase.isOnline()) {
      try {
        const fsKey = `${wkey[0]}_${wkey[1]}`;
        await firebase.firestore()
          .collection('users').doc(user.uid)
          .collection('data').doc(fsKey)
          .delete();
        firestoreOk = true;
      } catch(e) { console.warn('[editor] Firestore delete error:', e); }
    }
  }

  // Feedback visual en la fila
  const id = filename.replace('.', '_');
  const row = document.getElementById('row-' + id);
  if (row) {
    const resetBtn = row.querySelector('.reset-btn');
    if (resetBtn) {
      resetBtn.textContent = firestoreOk ? '✓ RESETEADO' : '✓ LOCAL';
      resetBtn.style.color = 'var(--g)';
      resetBtn.style.borderColor = 'rgba(48,216,128,0.3)';
      setTimeout(() => {
        resetBtn.textContent = '↺ RESET';
        resetBtn.style.color = '';
        resetBtn.style.borderColor = '';
      }, 2000);
    }
  }
}

async function loadApps() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    files = data
      .filter(f => f.type === 'file' && f.name.endsWith('.html')
        && f.name !== 'index.html'
        && f.name !== 'editor-categorias.html'
        && f.name !== 'guia_factura_luz.html')
      .sort((a, b) => a.name.localeCompare(b.name));
    renderApps();
  } catch (err) {
    document.getElementById('apps-list').innerHTML =
      `<div class="state-msg" style="color:var(--r)">Error cargando: ${err.message}</div>`;
  }
}

loadApps();
</script>
</body>
</html>
