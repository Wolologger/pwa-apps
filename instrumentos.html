<!DOCTYPE html>
<html lang="es">
<head>
<script>
// Anti-flash: aplica tema guardado antes del primer render
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('wapps.theme.prefs')||'{}');
    var mode = p.mode || 'dark';
    var accent = p.accent || 'yellow';
    var ACCENTS = {
      yellow:'#e8f040', blue:'#30a8f0', green:'#30d880',
      orange:'#f09030', pink:'#f060c0', white:'#f0ebe0'
    };
    var ACCENT_TEXT = {
      yellow:'#0a0a09', blue:'#ffffff', green:'#0a0a09',
      orange:'#ffffff', pink:'#ffffff', white:'#0a0a09'
    };
    var y = ACCENTS[accent] || '#e8f040';
    var yt = ACCENT_TEXT[accent] || '#0a0a09';
    var isDark = mode !== 'light';
    var fs = {small:'12px',medium:'14px',large:'16px'}[p.fontSize||'medium'];
    var r = document.documentElement.style;
    r.setProperty('--bg',    isDark?'#0a0a09':'#f5f4f0');
    r.setProperty('--bg2',   isDark?'#141412':'#ffffff');
    r.setProperty('--bg3',   isDark?'#1e1e1b':'#e8e6e0');
    r.setProperty('--text',  isDark?'#f0ebe0':'#1a1a18');
    r.setProperty('--muted', isDark?'#5a5850':'#7a7870');
    r.setProperty('--dim',   isDark?'#2a2a26':'#c8c6c0');
    r.setProperty('--border', isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.08)');
    r.setProperty('--border2',isDark?'rgba(255,255,255,0.13)':'rgba(0,0,0,0.15)');
    r.setProperty('--line',  isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)');
    r.setProperty('--line2', isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.12)');
    r.setProperty('--y', y); r.setProperty('--y-text', yt);
    document.documentElement.setAttribute('data-theme', mode);
    document.documentElement.style.fontSize = fs;
    document.body && (document.body.style.background = isDark?'#0a0a09':'#f5f4f0');
  } catch(e) {}
})();
</script>

<style>
:root{--bg:#0a0a09;--bg2:#141412;--bg3:#1e1e1b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ebe0;--muted:#5a5850;--dim:#2a2a26;--y:#e8f040;--r:#f04030;--g:#30d880;--b:#30a8f0;--o:#f09030;--fh:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;--fs:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fs);overflow-x:hidden;}
.wnav{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;flex-shrink:0;}
.wnav-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--y);background:rgba(232,240,64,0.08);color:var(--y);text-decoration:none;transition:all 0.15s;flex-shrink:0;}
.wnav-back:hover{background:rgba(232,240,64,0.18);color:var(--y);}
.wnav-logo{font-family:var(--fh);font-size:16px;letter-spacing:2px;flex-shrink:0;}
.wnav-logo a{color:var(--muted);text-decoration:none;}
.wnav-logo a span{color:var(--y);}
.wnav-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.wnav-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1;}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;}
.tipo-bar{display:flex;padding:10px 16px;gap:6px;border-bottom:1px solid var(--border2);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.tipo-bar::-webkit-scrollbar{display:none;}
.tipo-btn{flex-shrink:0;padding:6px 14px;font-family:var(--fh);font-size:13px;letter-spacing:1px;border:0.5px solid var(--border2);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.tipo-btn.active{background:var(--y);color:#0a0a09;border-color:var(--y);}
.tabs{display:flex;padding:0 16px;gap:2px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.tab{flex-shrink:0;padding:9px 14px;font-size:11px;font-family:var(--fm);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--y);border-bottom-color:var(--y);}
.content{flex:1;overflow-y:auto;padding:0 16px 100px;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
.section{display:none;padding-top:14px;}
.section.active{display:block;}
.add-panel{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:14px;display:none;}
.add-panel.open{display:block;}
.ap-title{font-family:var(--fh);font-size:18px;letter-spacing:0.5px;margin-bottom:12px;}
.field{margin-bottom:8px;}
.field-label{font-size:9px;color:var(--muted);font-family:var(--fm);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.field-row{display:flex;gap:8px;flex-wrap:wrap;}
.field-row>*{flex:1;min-width:100px;}
input,select,textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--fm);font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--y);}
select option{background:var(--bg2);}
textarea{resize:vertical;min-height:60px;line-height:1.5;}
.btn{padding:9px 16px;font-size:12px;font-family:var(--fm);border:0.5px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.btn:hover{background:var(--bg3);}
.btn-y{background:var(--y);color:#0a0a09;border-color:var(--y);font-family:var(--fh);font-size:15px;letter-spacing:1px;}
.btn-r{background:var(--r);color:#fff;border-color:var(--r);font-weight:500;}
.btn-sm{padding:5px 11px;font-size:11px;}
.inst-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;}
.inst-top{display:flex;gap:12px;align-items:flex-start;}
.inst-icon{font-size:26px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:10px;}
.inst-body{flex:1;min-width:0;}
.inst-name{font-family:var(--fh);font-size:20px;letter-spacing:0.5px;line-height:1;}
.inst-modelo{font-size:12px;color:var(--muted);font-family:var(--fm);margin-top:2px;}
.inst-chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.chip{font-size:9px;padding:2px 8px;border-radius:99px;font-family:var(--fm);}
.chip-y{background:rgba(232,240,64,0.1);color:var(--y);border:0.5px solid rgba(232,240,64,0.25);}
.chip-b{background:rgba(48,168,240,0.1);color:var(--b);border:0.5px solid rgba(48,168,240,0.25);}
.chip-o{background:rgba(240,144,48,0.1);color:var(--o);border:0.5px solid rgba(240,144,48,0.25);}
.chip-muted{background:rgba(90,88,80,0.12);color:var(--muted);border:0.5px solid var(--border2);}
.inst-setup{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.setup-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.setup-label{font-size:10px;color:var(--muted);font-family:var(--fm);}
.setup-date{font-size:12px;font-family:var(--fm);}
.setup-alert{color:var(--o);}
.inst-notas{font-size:11px;color:var(--muted);font-family:var(--fm);margin-top:8px;line-height:1.6;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid var(--dim);}
.edit-form{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:12px;margin-top:10px;display:none;}
.edit-form.open{display:block;}
.ef-row{display:flex;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
.ef-row>*{flex:1;min-width:100px;}
.ef-btns{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;font-family:var(--fm);}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:2.5rem 1rem;line-height:1.7;}
.data-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px;}
.fb{font-size:11px;margin-top:8px;display:none;font-family:var(--fm);}
.fab-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;padding:12px 16px 24px;background:linear-gradient(to top,var(--bg) 60%,transparent);pointer-events:none;}
.fab{pointer-events:all;width:100%;padding:13px;font-family:var(--fh);font-size:14px;background:var(--y);color:#0a0a09;border:none;border-radius:12px;cursor:pointer;letter-spacing:0.3px;}
.fab:active{transform:scale(0.97);}

/* ── SYNC BAR ── */
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--bg2,#141412);min-height:34px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sync-dot.online{background:var(--g,#30d880);}
.sync-dot.offline{background:var(--r,#f04030);}
.sync-dot.syncing{background:var(--y,#e8f040);animation:pulse 0.8s ease-in-out infinite;}
.sync-label{color:var(--muted,#5a5850);}
.sync-label.online{color:var(--g,#30d880);}
.sync-label.offline{color:var(--r,#f04030);}
.sync-label.syncing{color:var(--y,#e8f040);}
.sync-pending{font-size:9px;color:var(--y,#e8f040);letter-spacing:0.5px;}
.sync-btn{background:transparent;border:0.5px solid var(--dim,#2a2a26);color:var(--muted,#5a5850);font-family:var(--fm);font-size:9px;letter-spacing:1px;padding:3px 9px;cursor:pointer;transition:all 0.15s;}
.sync-btn:hover:not(:disabled){border-color:var(--y,#e8f040);color:var(--y,#e8f040);}
.sync-btn:disabled{opacity:0.35;cursor:default;}
.wnav-version{font-size:9px;color:var(--dim);font-family:var(--fm);letter-spacing:0.5px;border:1px solid var(--dim);padding:2px 6px;border-radius:3px;flex-shrink:0;}
</style>
</head>
<body>
<div class="shell">
  <div class="wnav">
    <a class="wnav-back" href="index.html"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="var(--y)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    <div class="wnav-logo"><a href="index.html">W<span>//</span>APPS</a></div>
    <div class="wnav-sep"></div>
    <div class="wnav-title">INSTRUMENTOS</div>
  <div class="wnav-version">v1.x</div>
  </div>
  <div class="sync-bar" id="sync-bar">
    <div class="sync-status">
      <div class="sync-dot offline" id="sync-dot"></div>
      <span class="sync-label offline" id="sync-label">OFFLINE</span>
      <span class="sync-pending" id="sync-pending"></span>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="sync-btn" id="pull-btn" onclick="manualPull()" disabled>↓ PULL</button>
      <button class="sync-btn" id="sync-btn" onclick="manualSync()" disabled>↑ SYNC</button>
      <button class="sync-btn" id="push-app-btn" onclick="manualPushApp()" title="Forzar subida a Firebase">⬆ SUBIR</button>
    </div>
  </div>
  <div class="tipo-bar" id="tipo-bar"></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('inventario',this)">Inventario</button>
    <button class="tab" onclick="showTab('datos',this)">Datos</button>
  </div>
  <div class="content">
    <div id="inventario" class="section active">
      <div class="add-panel" id="add-panel">
        <div class="ap-title">Nuevo instrumento</div>
        <div class="field-row">
          <div class="field"><div class="field-label">Tipo</div>
            <select id="f-tipo" onchange="updateFormFields()">
              <option value="guitarra">🎸 Guitarra</option>
              <option value="bajo">🎸 Bajo</option>
              <option value="amplificador">🔊 Amplificador</option>
              <option value="pedal">🎛️ Pedal</option>
            </select>
          </div>
          <div class="field"><div class="field-label">Nombre / marca</div><input type="text" id="f-nombre" placeholder="ej: Fender Jaguar"></div>
        </div>
        <div class="field"><div class="field-label">Modelo / descripción</div><input type="text" id="f-modelo" placeholder="ej: Player Series, color negro"></div>
        <div id="f-cuerdas-field" class="field-row">
          <div class="field"><div class="field-label">Calibre cuerdas</div><input type="text" id="f-calibre" placeholder="ej: 10-46, 45-105"></div>
          <div class="field"><div class="field-label">Afinación</div><input type="text" id="f-afinacion" placeholder="ej: E standard, Drop D"></div>
        </div>
        <div id="f-setup-field" class="field">
          <div class="field-label">Último ajuste / setup</div>
          <input type="date" id="f-setup">
        </div>
        <div class="field"><div class="field-label">Notas (serie, estado, compra…)</div><textarea id="f-notas" placeholder="Número de serie, dónde lo compraste, estado actual…"></textarea></div>
        <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;">
          <button class="btn btn-y" style="flex:1" onclick="addInstrumento()">Añadir</button>
          <button class="btn" onclick="closeAdd()">Cancelar</button>
        </div>
      </div>
      <div id="inst-body"></div>
    </div>
    <div id="datos" class="section">
      <div class="data-card">
        <div style="font-family:var(--fh);font-size:16px;margin-bottom:6px;">Exportar / Importar</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--fm);margin-bottom:10px;" id="datos-info"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-y btn-sm" style="flex:1" onclick="exportJSON()">↓ Exportar JSON</button>
          <button class="btn btn-sm" style="flex:1" onclick="document.getElementById('fi').click()">↑ Importar JSON</button>
          <input type="file" id="fi" accept=".json" style="display:none" onchange="importFile(event)">
        </div>
                <div style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border,rgba(255,255,255,0.07));">
          <div style="font-size:11px;color:var(--muted);font-family:var(--fm);margin-bottom:8px;">¿Primera vez? Vuelve a ver la guía.</div>
          <button class="btn btn-sm" style="width:100%;" onclick="if(typeof WOnboarding!=='undefined'){WOnboarding.reset('instrumentos');WOnboarding.show('instrumentos',OB_STEPS)}">👋 Ver guía de nuevo</button>
        </div>
        <div id="datos-fb" class="fb"></div>
      </div>
    </div>
  </div>
  <div class="fab-area">
    <button class="fab" onclick="toggleAdd()">+ Añadir instrumento</button>
  </div>
</div>
<script>
const TIPOS={guitarra:{label:'Guitarra',emoji:'🎸'},bajo:{label:'Bajo',emoji:'🎸'},amplificador:{label:'Amplificador',emoji:'🔊'},pedal:{label:'Pedal',emoji:'🎛️'}};
const TIPOS_WITH_STRINGS=['guitarra','bajo'];
let state=loadState(),nid=state.nextId||1,filterTipo='todos',editId=null,currentTab='inventario';

function loadState(){
  // 1. WStore (clave nueva — usada por backup/restore y Firebase sync)
  if(typeof WStore!=='undefined'){const v=WStore.get('instrumentos','data');if(v&&v.items)return v;}
  // 2. localStorage legacy
  try{const r=localStorage.getItem('instrumentos_v2');if(r)return JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('instrumentos_v1');if(r)return JSON.parse(r);}catch(e){}
  return{items:[],nextId:1};
}
function save(){
  state.nextId=nid;
  if(typeof WStore!=='undefined'){WStore.set('instrumentos','data',state);}
  try{localStorage.setItem('instrumentos_v2',JSON.stringify(state));}catch(e){}
}
function nxtId(){return++nid;}
function esc(s){var t=String(s||'');t=t.replace(/&/g,'&amp;');t=t.replace(new RegExp('<','g'),'&lt;');t=t.replace(new RegExp('>','g'),'&gt;');t=t.replace(new RegExp(String.fromCharCode(34),'g'),'&quot;');return t;}
function today(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function daysSince(dateStr){if(!dateStr)return null;return Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24));}

function showTab(name,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');el.classList.add('active');
  currentTab=name;render();
}

function toggleAdd(){document.getElementById('add-panel').classList.toggle('open');}
function closeAdd(){document.getElementById('add-panel').classList.remove('open');}

function updateFormFields(){
  const tipo=document.getElementById('f-tipo').value;
  const has=TIPOS_WITH_STRINGS.includes(tipo);
  document.getElementById('f-cuerdas-field').style.display=has?'flex':'none';
  document.getElementById('f-setup-field').style.display=has?'block':'none';
}

function addInstrumento(){
  const nombre=document.getElementById('f-nombre').value.trim();if(!nombre)return;
  const tipo=document.getElementById('f-tipo').value;
  state.items.push({
    id:nxtId(),tipo,nombre,
    modelo:document.getElementById('f-modelo').value.trim(),
    calibre:document.getElementById('f-calibre').value.trim(),
    afinacion:document.getElementById('f-afinacion').value.trim(),
    setup:document.getElementById('f-setup').value,
    notas:document.getElementById('f-notas').value.trim()
  });
  ['f-nombre','f-modelo','f-calibre','f-afinacion','f-setup','f-notas'].forEach(id=>document.getElementById(id).value='');
  closeAdd();save();render();
}

function render(){
  renderTipoBar();
  if(currentTab==='inventario')renderInventario();
  if(currentTab==='datos')renderDatos();
}

function renderTipoBar(){
  const counts={todos:state.items.length};
  Object.keys(TIPOS).forEach(t=>{counts[t]=state.items.filter(i=>i.tipo===t).length;});
  document.getElementById('tipo-bar').innerHTML=
    `<button class="tipo-btn ${filterTipo==='todos'?'active':''}" onclick="setTipo('todos')">Todos (${counts.todos})</button>`+
    Object.entries(TIPOS).map(([k,v])=>counts[k]?`<button class="tipo-btn ${filterTipo===k?'active':''}" onclick="setTipo('${k}')">${v.emoji} ${v.label} (${counts[k]})</button>`:'').join('');
}

function setTipo(t){filterTipo=t;render();}

function renderInventario(){
  const items=filterTipo==='todos'?state.items:state.items.filter(i=>i.tipo===filterTipo);
  if(!items.length){document.getElementById('inst-body').innerHTML='<div class="empty">Sin instrumentos registrados.<br>Pulsa + para añadir el primero.</div>';return;}
  const groups={};
  items.forEach(i=>{if(!groups[i.tipo])groups[i.tipo]=[];groups[i.tipo].push(i);});
  let html='';
  Object.entries(groups).forEach(([tipo,arr])=>{
    if(filterTipo!=='todos')html+=arr.map(i=>instCard(i)).join('');
    else html+=`<div class="section-label">${TIPOS[tipo].emoji} ${TIPOS[tipo].label}</div>`+arr.map(i=>instCard(i)).join('');
  });
  document.getElementById('inst-body').innerHTML=html;
}

function instCard(i){
  const isEd=editId===i.id;
  const has=TIPOS_WITH_STRINGS.includes(i.tipo);
  const setupDays=daysSince(i.setup);
  const setupAlert=setupDays!==null&&setupDays>180;
  return`<div class="inst-card">
    <div class="inst-top">
      <div class="inst-icon">${TIPOS[i.tipo]?.emoji||'🎸'}</div>
      <div class="inst-body">
        <div class="inst-name">${esc(i.nombre)}</div>
        ${i.modelo?`<div class="inst-modelo">${esc(i.modelo)}</div>`:''}
        <div class="inst-chips">
          ${i.calibre?`<span class="chip chip-b">⚙ ${esc(i.calibre)}</span>`:''}
          ${i.afinacion?`<span class="chip chip-y">${esc(i.afinacion)}</span>`:''}
          ${setupAlert?`<span class="chip chip-o">⚠ Setup hace +${setupDays}d</span>`:''}
        </div>
        ${has&&i.setup?`<div class="inst-setup">
          <div class="setup-row">
            <span class="setup-label">Último setup</span>
            <span class="setup-date ${setupAlert?'setup-alert':''}">${i.setup} ${setupDays!==null?`(hace ${setupDays} días)`:''}</span>
          </div>
        </div>`:''}
        ${i.notas?`<div class="inst-notas">${esc(i.notas)}</div>`:''}
      </div>
      <button class="btn btn-sm" style="opacity:0.3;border:none;padding:2px 6px;font-size:13px;flex-shrink:0;" onclick="startEdit(${i.id})">✎</button>
    </div>
    <div class="edit-form ${isEd?'open':''}" id="ef-${i.id}">
      <div class="ef-row">
        <div><div class="field-label">Nombre</div><input type="text" id="ei-n-${i.id}" value="${esc(i.nombre)}"></div>
        <div><div class="field-label">Modelo</div><input type="text" id="ei-m-${i.id}" value="${esc(i.modelo||'')}"></div>
      </div>
      ${has?`<div class="ef-row">
        <div><div class="field-label">Calibre</div><input type="text" id="ei-cal-${i.id}" value="${esc(i.calibre||'')}"></div>
        <div><div class="field-label">Afinación</div><input type="text" id="ei-af-${i.id}" value="${esc(i.afinacion||'')}"></div>
      </div>
      <div class="ef-row">
        <div><div class="field-label">Último setup</div><input type="date" id="ei-s-${i.id}" value="${i.setup||''}"></div>
      </div>`:''}
      <div><div class="field-label">Notas</div><textarea id="ei-no-${i.id}">${esc(i.notas||'')}</textarea></div>
      <div class="ef-btns">
        <button class="btn btn-y btn-sm" style="flex:1" onclick="saveEdit(${i.id},${has})">Guardar</button>
        <button class="btn btn-sm" onclick="cancelEdit()">Cancelar</button>
        <button class="btn btn-sm btn-r" onclick="delItem(${i.id})">Eliminar</button>
      </div>
    </div>
  </div>`;
}

function startEdit(id){editId=(editId===id?null:id);render();}
function cancelEdit(){editId=null;render();}
function saveEdit(id,has){
  const i=state.items.find(x=>x.id===id);if(!i)return;
  i.nombre=document.getElementById('ei-n-'+id).value.trim();
  i.modelo=document.getElementById('ei-m-'+id).value.trim();
  if(has){
    i.calibre=document.getElementById('ei-cal-'+id).value.trim();
    i.afinacion=document.getElementById('ei-af-'+id).value.trim();
    i.setup=document.getElementById('ei-s-'+id).value;
  }
  i.notas=document.getElementById('ei-no-'+id).value.trim();
  editId=null;save();render();
}
function delItem(id){if(!confirm('¿Eliminar?'))return;state.items=state.items.filter(x=>x.id!==id);editId=null;save();render();}

function renderDatos(){
  document.getElementById('datos-info').textContent=`${state.items.length} instrumento${state.items.length!==1?'s':''}`;
}
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`instrumentos-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showFB('Descargado ✓','var(--g)');
}
function importFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!p.items)throw new Error('Formato inválido');
      if(!confirm(`¿Importar ${p.items.length} instrumentos?`))return;
      state=p;nid=state.nextId||1;save();render();showFB('Importado ✓','var(--g)');
    }catch(err){showFB('Error: '+err.message,'var(--r)');}
  };r.readAsText(f);
}
function showFB(msg,color){const el=document.getElementById('datos-fb');if(!el)return;el.textContent=msg;el.style.color=color;el.style.display='block';setTimeout(()=>el.style.display='none',2500);}

updateFormFields();

const OB_STEPS = [
  {
    icon:'🎸',
    title:'Bienvenido a Instrumentos',
    body:'Registra todos tus instrumentos, pedales y equipos. Consulta su gear de un vistazo desde el Setlist.'
  },
  {
    icon:'🎛️',
    title:'Gear por instrumento',
    body:'Añade modelo, tipo de cuerdas y configuración. Todo aparece automáticamente en el modo directo del Setlist cuando lo asignas a una canción.'
  },
  {
    icon:'⚙️',
    title:'Seguimiento de setup',
    body:'Anota la fecha del último setup. La app te avisará cuando lleve más de 180 días sin mantenimiento.'
  },
  {
    icon:'📊',
    title:'Pestaña Datos',
    body:'Exporta e importa tu inventario como JSON para hacer backup o moverlo a otro dispositivo.'
  },
];

if(typeof WOnboarding!=='undefined')WOnboarding.show('instrumentos', OB_STEPS);
render();
// Si localStorage estaba vacío, recuperar desde Firestore en background
if(typeof WStore!=='undefined'){
  WStore.syncOnLoad('instrumentos','data',fresh=>{state=fresh;nid=state.nextId||1;updateFormFields();render();});
  window.addEventListener('wapps:recovered', () => {
    const fresh=WStore.get('instrumentos','data');
    if(fresh&&fresh.items){state=fresh;nid=state.nextId||1;updateFormFields();render();}
  });
  window.addEventListener('wapps:auth-change', e => {
    if (!e.detail?.user) return;
    WStore.syncOnLoad('instrumentos', 'data', fresh => {
      if (fresh && fresh.items) { state = fresh; nid = state.nextId||1; updateFormFields(); render(); }
    });
  
    updateSyncUI(_fb()?.isOnline() ? 'online' : 'offline', _sync()?.getPending().length ?? 0);
  });
}

function _fb()   { return (typeof WFirebase !== 'undefined') ? WFirebase : null; }
function _sync() { return (typeof WSync     !== 'undefined') ? WSync     : null; }
function updateSyncUI(state, pendingCount) {
  const dot  = document.getElementById('sync-dot');
  const label= document.getElementById('sync-label');
  const btn  = document.getElementById('sync-btn');
  const pend = document.getElementById('sync-pending');
  if (!dot) return;
  dot.className   = 'sync-dot ' + state;
  label.className = 'sync-label ' + state;
  const labels = { online:'ONLINE', offline:'OFFLINE', syncing:'SINCRONIZANDO...' };
  label.textContent = labels[state] || state.toUpperCase();
  pend.textContent = pendingCount > 0 ? '· ' + pendingCount + ' PENDIENTE' + (pendingCount > 1 ? 'S' : '') : '';
  const fb = _fb();
  const canSync = state === 'online' && fb && fb.getUser() && pendingCount > 0;
  btn.disabled = !canSync;
  const pullBtn = document.getElementById('pull-btn');
  if (pullBtn) pullBtn.disabled = !(state === 'online' && fb && fb.getUser());
  const pushAppBtn = document.getElementById('push-app-btn');
  if (pushAppBtn) pushAppBtn.disabled = false;
}
async function manualSync() {
  const fb   = _fb();
  const sync = _sync();
  if (!fb || !sync) return;
  const user = fb.getUser();
  if (!user || !fb.isOnline()) return;
  updateSyncUI('syncing', sync.getPending().length);
  document.getElementById('sync-btn').disabled = true;
  await sync.syncAll(user.uid);
  updateSyncUI(fb.isOnline() ? 'online' : 'offline', sync.getPending().length);
}
async function manualPull() {
  const fb   = _fb();
  const sync = _sync();
  if (!fb || !sync) return;
  const user = fb.getUser();
  if (!user || !fb.isOnline()) return;
  const btn = document.getElementById('pull-btn');
  if (btn) btn.disabled = true;
  updateSyncUI('syncing', sync.getPending().length);
  await sync.pullAll(user.uid);
  updateSyncUI(fb.isOnline() ? 'online' : 'offline', sync.getPending().length);
  if (btn) btn.disabled = false;
  window.location.reload();
}
async function manualPushApp() {
  const fb   = _fb();
  const sync = _sync();
  if (!fb || !sync) return;
  const user = fb.getUser();
  if (!user || !fb.isOnline()) return;
  const btn = document.getElementById('push-app-btn');
  if (btn) btn.disabled = true;
  updateSyncUI('syncing', sync.getPending().length);
  const { pushed, failed } = await sync.pushAll(user.uid, 'instrumentos.data');
  updateSyncUI(fb.isOnline() ? 'online' : 'offline', sync.getPending().length);
  if (btn) {
    btn.disabled = false;
    btn.textContent = failed > 0 ? `⚠ ${pushed}/${pushed+failed}` : pushed > 0 ? `✓ ${pushed}` : '⬆ SUBIR';
    if (pushed > 0 || failed > 0) setTimeout(() => { if(btn) btn.textContent = '⬆ SUBIR'; }, 3000);
  }
  console.info(`[PUSH APP] instrumentos.data: ${pushed} subidas, ${failed} fallidas`);
}
window.addEventListener('wapps:online',      () => updateSyncUI('online',  _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:offline',     () => updateSyncUI('offline', _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:sync-start',  () => updateSyncUI('syncing', _sync()?.getPending().length ?? 0));
window.addEventListener('wapps:sync-done',   () => { const fb=_fb(); updateSyncUI(fb?(fb.isOnline()?'online':'offline'):'offline', _sync()?.getPending().length??0); });
window.addEventListener('wapps:pending-change', e => {
  const fb=_fb(); const label=document.getElementById('sync-label');
  const isSyncing=label?.className?.includes('syncing');
  const state=isSyncing?'syncing':(fb?(fb.isOnline()?'online':'offline'):'offline');
  updateSyncUI(state, e.detail.pending.length);
});
updateSyncUI(navigator.onLine ? 'online' : 'offline', 0);

</script>
</body>
</html>
